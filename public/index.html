<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Filtro de categorias ──────────────────────────────────────────── */
    .category-filter {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }
    .cat-pill {
      padding: .35rem .9rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
      color: var(--text);
    }
    .cat-pill:hover  { border-color: var(--accent); color: var(--accent); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Card minimalista ──────────────────────────────────────────────── */
    .product-card {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      transition: transform .18s, box-shadow .18s;
    }
    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.09);
    }
    .product-card-img-wrap {
      position: relative;
      overflow: hidden;
    }
    .product-card-img-wrap img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .product-card:hover .product-card-img-wrap img {
      transform: scale(1.03);
    }
    .product-card-badges {
      position: absolute;
      top: .6rem;
      left: .6rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .badge-chip {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 3px 8px;
      border-radius: 99px;
      text-transform: uppercase;
    }
    .badge-chip svg { width: 10px; height: 10px; flex-shrink: 0; }
    .badge-chip.preorder  { background: #f59e0b; color: #fff; }
    .badge-chip.expired   { background: #94a3b8; color: #fff; }
    .badge-chip.out-stock { background: #ef4444; color: #fff; }
    .badge-chip.low-stock { background: #f97316; color: #fff; }

    .product-card-body {
      padding: .9rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .product-card-cat {
      font-size: .72rem;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .25rem;
    }
    .product-card-name {
      font-weight: 600;
      font-size: .95rem;
      line-height: 1.35;
      color: var(--text);
    }
    .product-card-desc {
      font-size: .82rem;
      color: var(--muted);
      margin-top: .3rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-card-price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent);
      margin-top: .6rem;
    }
    .product-card-deadline {
      font-size: .73rem;
      color: var(--muted);
      margin-top: .25rem;
      display: flex;
      align-items: center;
      gap: .25rem;
    }
    .product-card-deadline svg { width: 11px; height: 11px; flex-shrink: 0; }
    .product-card-deadline.active { color: #d97706; }
    .product-card-deadline.expired { color: #94a3b8; }

    .product-card-actions { margin-top: auto; padding-top: .85rem; }

    /* Seletor de variações */
    .size-selector { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .65rem; }
    .size-btn {
      padding: .2rem .55rem;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: none;
      font-size: .8rem;
      cursor: pointer;
      transition: all .12s;
    }
    .size-btn:hover   { border-color: var(--accent); color: var(--accent); }
    .size-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 600; }
    .size-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Botão encomenda */
    .btn-preorder { background: #f59e0b; border-color: #f59e0b; color: #fff; }
    .btn-preorder:hover { background: #d97706; border-color: #d97706; }

    /* Rodapé do card — banner sobre a imagem */
    .product-card-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: .45rem .85rem;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-align: center;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      /* Sombra suave para separar da imagem */
      box-shadow: 0 -2px 8px rgba(0,0,0,.18);
      /* Transição suave no hover do card */
      transition: opacity .2s;
      z-index: 2;
    }
  </style>
</head>
<body>

<div id="header-root"></div>

<!-- Cart Drawer -->
<div class="drawer-overlay" id="cart-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="cart-drawer">
  <div class="drawer-header">
    <h2>Carrinho</h2>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="cart-body"></div>
  <div class="drawer-footer">
    <div class="cart-total" id="cart-total-row"
         style="display:flex;justify-content:space-between;font-weight:700;margin-bottom:.75rem">
      <span>Total</span><span id="cart-total"></span>
    </div>
    <a href="/checkout.html" id="cart-checkout-btn"
       class="btn btn-primary btn-full btn-lg">
      Finalizar Compra
    </a>
  </div>
</aside>

<main class="container page-content">
  <h1 class="section-title">Nossos Produtos</h1>
  <div class="category-filter" id="category-filter"></div>
  <div class="products-grid" id="products-grid">
    <p style="color:var(--muted)">Carregando produtos…</p>
  </div>
</main>

<div id="toast"></div>

<script src="/js/site-config.js"></script>
<script src="/js/header.js"></script>
<script src="/js/cart.js"></script>
<script>
  renderHeader({ showCart: true });

  let allProducts   = [];
  let allCategories = [];
  let activeCategory = null;

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Filtro de categorias ────────────────────────────────────────────────────
  function renderCategoryFilter() {
    const container = document.getElementById('category-filter');
    if (!allCategories.length) { container.style.display = 'none'; return; }

    const pills = [
      `<button class="cat-pill ${activeCategory === null ? 'active' : ''}" onclick="setCategory(null)">Todos</button>`,
      ...allCategories.map(c =>
        `<button class="cat-pill ${activeCategory === c.id ? 'active' : ''}" onclick="setCategory(${c.id})">${c.name}</button>`
      ),
    ];
    container.innerHTML = pills.join('');
  }

  function setCategory(id) {
    activeCategory = id;
    renderCategoryFilter();
    renderProducts();
  }

  // ── SVG helpers ─────────────────────────────────────────────────────────────
  const svgClock   = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const svgPkg     = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`;
  const svgWarn    = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
  const svgBan     = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`;

  // ── Grid de produtos ─────────────────────────────────────────────────────────
  function renderProducts() {
    const grid = document.getElementById('products-grid');
    const list = activeCategory === null
      ? allProducts
      : allProducts.filter(p => p.category_id === activeCategory);

    if (!list.length) {
      grid.innerHTML = '<p style="color:var(--muted)">Nenhum produto disponível.</p>';
      return;
    }

    grid.innerHTML = list.map(p => {
      const hasVariations = p.variations && p.variations.length > 0;
      const isMTO         = !!p.made_to_order;
      const expired       = !!p.preorder_expired;
      const semEstoque    = !isMTO && !hasVariations && p.stock <= 0;
      const lowStock      = !isMTO && !hasVariations && p.stock > 0 && p.stock <= 5;

      // ── Badges sobre a imagem ──────────────────────────────────────────
      let badges = '';
      if (isMTO && expired)
        badges = `<span class="badge-chip expired">${svgBan} Encerrado</span>`;
      else if (isMTO)
        badges = `<span class="badge-chip preorder">${svgPkg} Encomenda</span>`;
      else if (semEstoque)
        badges = `<span class="badge-chip out-stock">${svgBan} Esgotado</span>`;
      else if (lowStock)
        badges = `<span class="badge-chip low-stock">${svgWarn} Últimas unidades</span>`;

      // ── Prazo de encomenda ─────────────────────────────────────────────
      let deadlineHTML = '';
      if (isMTO && p.preorder_deadline) {
        const cls = expired ? 'expired' : 'active';
        deadlineHTML = `
          <div class="product-card-deadline ${cls}">
            ${svgClock}
            ${expired ? 'Encerrado em' : 'Pedidos até'} ${fmtDate(p.preorder_deadline)}
          </div>`;
      }

      // ── Botão de ação ──────────────────────────────────────────────────
      let actionBtn = '';
      if (isMTO && expired) {
        actionBtn = `<button class="btn btn-primary btn-full" disabled>Encomendas Encerradas</button>`;
      } else if (isMTO) {
        if (hasVariations) {
          actionBtn = `
            <div class="size-selector" id="sizes-${p.id}">
              ${p.variations.map(v => `
                <button class="size-btn" data-pid="${p.id}" data-vid="${v.id}" data-label="${v.label}"
                  onclick="selectSize(this)">${v.label}</button>
              `).join('')}
            </div>
            <button class="btn btn-primary btn-preorder btn-full"
              onclick="addWithVariation(${p.id}, '${p.name.replace(/'/g,"\\'")}', ${p.price})">
              Pedir sob Encomenda
            </button>`;
        } else {
          actionBtn = `<button class="btn btn-primary btn-preorder btn-full"
            onclick="addToCart({productId:${p.id},productName:'${p.name.replace(/'/g,"\\'")}',price:${p.price},quantity:1,image:'${(p.image_url||'').replace(/'/g,"\\'")}' });showToast('Adicionado ao carrinho!')">
            Pedir sob Encomenda
          </button>`;
        }
      } else if (semEstoque) {
        actionBtn = `<button class="btn btn-primary btn-full" disabled>Sem Estoque</button>`;
      } else if (hasVariations) {
        actionBtn = `
          <div class="size-selector" id="sizes-${p.id}">
            ${p.variations.map(v => `
              <button class="size-btn" data-pid="${p.id}" data-vid="${v.id}" data-label="${v.label}"
                ${v.stock <= 0 ? 'disabled title="Sem estoque"' : ''}
                onclick="selectSize(this)">${v.label}</button>
            `).join('')}
          </div>
          <button class="btn btn-primary btn-full"
            onclick="addWithVariation(${p.id}, '${p.name.replace(/'/g,"\\'")}', ${p.price})">
            Adicionar ao Carrinho
          </button>`;
      } else {
        actionBtn = `<button class="btn btn-primary btn-full"
          onclick="addToCart({productId:${p.id},productName:'${p.name.replace(/'/g,"\\'")}',price:${p.price},quantity:1,image:'${(p.image_url||'').replace(/'/g,"\\'")}' });showToast('Adicionado ao carrinho!')">
          Adicionar ao Carrinho
        </button>`;
      }

      return `
        <div class="product-card">
          <div class="product-card-img-wrap">
            <img src="..." alt="...">
            ${badges ? `<div class="product-card-badges">${badges}</div>` : ''}
            ${p.card_footer ? `
              <div class="product-card-footer"
                  style="background:${p.card_footer_bg||'#1e293b'};color:${p.card_footer_color||'#fff'}">
                ${p.card_footer}
              </div>` : ''}
          </div>
          <div class="product-card-body">
            ${p.category_name ? `<div class="product-card-cat">${p.category_name}</div>` : ''}
            <div class="product-card-name">${p.name}</div>
            ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
            <div class="product-card-price">${fmt(p.price)}</div>
            ${deadlineHTML}
            <div class="product-card-actions">${actionBtn}</div>
          </div>
        </div>`;
    }).join('');
  }

  function selectSize(btn) {
    const pid = btn.dataset.pid;
    document.querySelectorAll(`#sizes-${pid} .size-btn`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function addWithVariation(pid, pname, price) {
    const sel = document.querySelector(`#sizes-${pid} .size-btn.selected`);
    if (!sel) { showToast('Selecione um tamanho!'); return; }
    const prod = allProducts.find(p => p.id === pid);
    addToCart({
      productId:      pid,
      productName:    pname,
      price,
      variationId:    Number(sel.dataset.vid),
      variationLabel: sel.dataset.label,
      quantity:       1,
      image:          prod?.image_url || null,
    });
    showToast('Adicionado ao carrinho!');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  async function init() {
    const grid = document.getElementById('products-grid');
    try {
      const [catRes, prodRes] = await Promise.all([
        fetch('/api/categories'),
        fetch('/api/products'),
      ]);
      if (!catRes.ok || !prodRes.ok)
        throw new Error(`Erro na API: ${!catRes.ok ? catRes.status : prodRes.status}`);

      allCategories = await catRes.json();
      allProducts   = await prodRes.json();
      renderCategoryFilter();
      renderProducts();
    } catch (err) {
      console.error('Erro ao carregar produtos:', err);
      grid.innerHTML = '<p style="color:var(--danger)">Erro ao carregar produtos. Verifique se o servidor está rodando.</p>';
    }
  }

  init();
</script>
</body>
</html>
