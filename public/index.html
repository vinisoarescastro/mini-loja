<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .category-filter {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .cat-pill {
      padding: .35rem .85rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
      color: var(--text);
    }
    .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  </style>
</head>
<body>

<!-- Header injetado pelo componente centralizado -->
<div id="header-root"></div>

<!-- Cart Drawer -->
<div class="drawer-overlay" id="cart-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="cart-drawer">
  <div class="drawer-header">
    <h2>Carrinho</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="cart-body"></div>
  <div class="drawer-footer">
    <div class="cart-total" id="cart-total-row" style="display:flex;justify-content:space-between;font-weight:700;margin-bottom:.75rem">
      <span>Total</span><span id="cart-total"></span>
    </div>
    <a href="/checkout.html" id="cart-checkout-btn" class="btn btn-primary btn-full btn-lg" disabled>
      Finalizar Compra
    </a>
  </div>
</aside>

<main class="container page-content">
  <h1 class="section-title">Nossos Produtos</h1>

  <!-- Filtro de categorias (renderizado dinamicamente) -->
  <div class="category-filter" id="category-filter"></div>

  <div class="products-grid" id="products-grid">
    <p style="color:var(--muted)">Carregando produtos…</p>
  </div>
</main>

<div id="toast"></div>

<script src="/js/site-config.js"></script>
<script src="/js/header.js"></script>
<script src="/js/cart.js"></script>
<script>
  // Renderiza o header com carrinho
  renderHeader({ showCart: true });

  let allProducts  = [];
  let allCategories = [];
  let activeCategory = null;

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Filtro de categorias ──────────────────────────────────────────────────
  function renderCategoryFilter() {
    const container = document.getElementById('category-filter');
    if (!allCategories.length) { container.style.display = 'none'; return; }

    const pills = [
      `<button class="cat-pill ${activeCategory === null ? 'active' : ''}"
               onclick="setCategory(null)">Todos</button>`,
      ...allCategories.map(c =>
        `<button class="cat-pill ${activeCategory === c.id ? 'active' : ''}"
                 onclick="setCategory(${c.id})">${c.name}</button>`
      ),
    ];
    container.innerHTML = pills.join('');
  }

  function setCategory(id) {
    activeCategory = id;
    renderCategoryFilter();
    renderProducts();
  }

  // ── Grid de produtos ───────────────────────────────────────────────────────
  function renderProducts() {
    const grid = document.getElementById('products-grid');
    const list = activeCategory === null
      ? allProducts
      : allProducts.filter(p => p.category_id === activeCategory);

    if (!list.length) {
      grid.innerHTML = '<p style="color:var(--muted)">Nenhum produto disponível.</p>';
      return;
    }

    grid.innerHTML = list.map(p => {
      const hasVariations = p.variations && p.variations.length > 0;
      const semEstoque    = !hasVariations && p.stock <= 0;

      return `
        <div class="card product-card">
          <img src="${p.image_url || 'https://via.placeholder.com/400x220?text=Sem+Imagem'}" alt="${p.name}">
          <div class="product-card-body">
            ${p.category_name ? `<div style="font-size:.75rem;color:var(--accent);font-weight:600;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.05em">${p.category_name}</div>` : ''}
            <div class="product-card-name">${p.name}</div>
            ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
            <div class="product-card-price">${fmt(p.price)}</div>

            ${hasVariations ? `
              <div class="size-selector" id="sizes-${p.id}">
                ${p.variations.map(v => `
                  <button class="size-btn" data-pid="${p.id}" data-vid="${v.id}" data-label="${v.label}"
                    ${v.stock <= 0 ? 'disabled title="Sem estoque"' : ''}
                    onclick="selectSize(this)">${v.label}</button>
                `).join('')}
              </div>
              <button class="btn btn-primary btn-full" style="margin-top:.75rem"
                onclick="addWithVariation(${p.id}, '${p.name}', ${p.price})">
                Adicionar ao Carrinho
              </button>
            ` : semEstoque ? `
              <button class="btn btn-primary btn-full" disabled style="margin-top:.75rem">Sem Estoque</button>
            ` : `
              <button class="btn btn-primary btn-full" style="margin-top:.75rem"
                onclick="addToCart({productId:${p.id},productName:'${p.name.replace(/'/g,"\\'")}',price:${p.price},quantity:1});showToast('Adicionado ao carrinho!')">
                Adicionar ao Carrinho
              </button>
            `}
          </div>
        </div>`;
    }).join('');
  }

  function selectSize(btn) {
    const pid = btn.dataset.pid;
    document.querySelectorAll(`#sizes-${pid} .size-btn`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function addWithVariation(pid, pname, price) {
    const sel = document.querySelector(`#sizes-${pid} .size-btn.selected`);
    if (!sel) { showToast('Selecione um tamanho!'); return; }
    addToCart({
      productId: pid, productName: pname, price,
      variationId: Number(sel.dataset.vid), variationLabel: sel.dataset.label, quantity: 1,
    });
    showToast('Adicionado ao carrinho!');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    const [catRes, prodRes] = await Promise.all([
      fetch('/api/categories'),
      fetch('/api/products'),
    ]);
    allCategories = await catRes.json();
    allProducts   = await prodRes.json();
    renderCategoryFilter();
    renderProducts();
  }

  init();
</script>
</body>
</html>
