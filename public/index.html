<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .category-filter {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }
    .cat-pill {
      padding: .35rem .9rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
      color: var(--text);
    }
    .cat-pill:hover  { border-color: var(--accent); color: var(--accent); }
    .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ─────────────────────────────────────────────────────────── */
    .product-card {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,.1);
      border-color: var(--accent);
    }

    .product-card-img-wrap {
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    .product-card-img-wrap img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform .35s ease;
    }
    .product-card:hover .product-card-img-wrap img { transform: scale(1.05); }

    .product-card-badges {
      position: absolute;
      top: .55rem; left: .55rem;
      display: flex; flex-direction: column; gap: .3rem;
      z-index: 2; pointer-events: none;
    }

    .badge-chip {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .66rem; font-weight: 700; letter-spacing: .04em;
      padding: 3px 8px; border-radius: 99px; text-transform: uppercase;
    }
    .badge-chip svg { width: 10px; height: 10px; flex-shrink: 0; }
    .badge-chip.preorder  { background: #f59e0b; color: #fff; }
    .badge-chip.expired   { background: #94a3b8; color: #fff; }
    .badge-chip.out-stock { background: #ef4444; color: #fff; }
    .badge-chip.low-stock { background: #f97316; color: #fff; }

    .product-card-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: .4rem .85rem;
      font-size: .7rem; font-weight: 700;
      letter-spacing: .04em; text-align: center;
      text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      box-shadow: 0 -2px 8px rgba(0,0,0,.18);
      pointer-events: none;
    }

    .product-card-body {
      padding: .85rem .95rem .95rem;
      display: flex; flex-direction: column; flex: 1; gap: .2rem;
    }
    .product-card-cat {
      font-size: .68rem; color: var(--accent);
      font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    }
    .product-card-name {
      font-weight: 600; font-size: .93rem; line-height: 1.35; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-card-price {
      font-size: 1.25rem; font-weight: 800; color: var(--text); margin-top: .45rem;
    }
    .product-card-installment { font-size: .78rem; color: var(--muted); margin-top: .05rem; }
    .product-card-installment strong { color: var(--accent); font-weight: 700; }

    /* ── Card expirado ────────────────────────────────────────────────── */
    .product-card.is-expired {
      opacity: .45;
      filter: grayscale(70%);
      cursor: default;
      pointer-events: none;
    }
    .product-card.is-expired:hover {
      transform: none;
      box-shadow: none;
      border-color: var(--border);
    }

    /* Indicador de hover "Ver produto" */
    .product-card-cta {
      display: flex; align-items: center; gap: .3rem;
      font-size: .8rem; font-weight: 600; color: var(--accent);
      margin-top: .65rem;
      opacity: 0; transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
    }
    .product-card:hover .product-card-cta { opacity: 1; transform: translateX(0); }
    .product-card-cta svg { width: 14px; height: 14px; }
  </style>
</head>
<body>

<div id="header-root"></div>

<div class="drawer-overlay" id="cart-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="cart-drawer">
  <div class="drawer-header">
    <h2>Carrinho</h2>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="cart-body"></div>
  <div class="drawer-footer">
    <div class="cart-total" id="cart-total-row"
         style="display:flex;justify-content:space-between;font-weight:700;margin-bottom:.75rem">
      <span>Total</span><span id="cart-total"></span>
    </div>
    <a href="/checkout.html" id="cart-checkout-btn" class="btn btn-primary btn-full btn-lg">
      Finalizar Compra
    </a>
  </div>
</aside>

<main class="container page-content">
  <h1 class="section-title">Nossos Produtos</h1>
  <div class="category-filter" id="category-filter"></div>
  <div class="products-grid" id="products-grid">
    <p style="color:var(--muted)">Carregando produtos…</p>
  </div>
</main>

<script src="/js/site-config.js"></script>
<script src="/js/header.js"></script>
<script src="/js/cart.js"></script>
<script>
  renderHeader({ showCart: true });

  let allProducts   = [];
  let allCategories = [];
  let activeCategory = null;

  const INSTALL_COUNT = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.installments) || 6;

  // ── SVG badges ───────────────────────────────────────────────────────────────
  const SVG_PKG   = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;
  const SVG_CLOCK = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const SVG_WARN  = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
  const SVG_ARROW = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  function fmtInstallment(price) {
    return `${INSTALL_COUNT}x de <strong>${fmt(price / INSTALL_COUNT)}</strong>`;
  }

  function renderCategoryFilter() {
    const container = document.getElementById('category-filter');
    if (!allCategories.length) { container.style.display = 'none'; return; }
    container.innerHTML = [
      `<button class="cat-pill ${activeCategory === null ? 'active' : ''}" onclick="setCategory(null)">Todos</button>`,
      ...allCategories.map(c =>
        `<button class="cat-pill ${activeCategory === c.id ? 'active' : ''}" onclick="setCategory(${c.id})">${c.name}</button>`
      ),
    ].join('');
  }

  function setCategory(id) {
    activeCategory = id;
    renderCategoryFilter();
    renderProducts();
  }

  function renderProducts() {
    const grid = document.getElementById('products-grid');
    const list = activeCategory === null
      ? allProducts
      : allProducts.filter(p => p.category_id === activeCategory);

    if (!list.length) {
      grid.innerHTML = '<p style="color:var(--muted)">Nenhum produto disponível.</p>';
      return;
    }

    grid.innerHTML = list.map(p => {
      const isMTO   = !!p.made_to_order;
      const expired = !!p.preorder_expired;

      let badges = '';
      if (isMTO && !expired) badges += `<span class="badge-chip preorder">${SVG_PKG} Encomenda</span>`;
      if (expired)            badges += `<span class="badge-chip expired">${SVG_CLOCK} Encerrado</span>`;

      const totalStock = p.variations?.length
        ? p.variations.reduce((s, v) => s + (v.stock || 0), 0)
        : (p.stock || 0);
      if (!isMTO && !expired && totalStock <= 0)  badges += `<span class="badge-chip out-stock">${SVG_WARN} Sem estoque</span>`;
      else if (!isMTO && !expired && totalStock <= 3) badges += `<span class="badge-chip low-stock">${SVG_WARN} Últimas unidades</span>`;

      return `
        <a class="product-card${expired ? ' is-expired' : ''}" ${expired ? '' : `href="/produto.html?id=${p.id}"`} aria-label="${p.name}"${expired ? ' tabindex="-1" aria-disabled="true"' : ''}>
          <div class="product-card-img-wrap">
            <img src="${p.image_url || (p.images && p.images[0]) || ''}"
                 alt="${p.name}" loading="lazy"
                 onerror="this.style.opacity='0'">
            ${badges ? `<div class="product-card-badges">${badges}</div>` : ''}
            ${p.card_footer ? `
              <div class="product-card-footer"
                   style="background:${p.card_footer_bg || '#1e293b'};color:${p.card_footer_color || '#fff'}">
                ${p.card_footer}
              </div>` : ''}
          </div>
          <div class="product-card-body">
            ${p.category_name ? `<div class="product-card-cat">${p.category_name}</div>` : ''}
            <div class="product-card-name">${p.name}</div>
            <div class="product-card-price">${fmt(p.price)}</div>
            <div class="product-card-installment">${fmtInstallment(p.price)}</div>
            <div class="product-card-cta">
              Ver produto ${SVG_ARROW}
            </div>
          </div>
        </a>`;
    }).join('');
  }

  async function init() {
    const grid = document.getElementById('products-grid');
    try {
      const [catRes, prodRes] = await Promise.all([
        fetch('/api/categories'),
        fetch('/api/products'),
      ]);
      if (!catRes.ok || !prodRes.ok)
        throw new Error(`Erro na API: ${!catRes.ok ? catRes.status : prodRes.status}`);
      allCategories = await catRes.json();
      allProducts   = await prodRes.json();
      renderCategoryFilter();
      renderProducts();
    } catch (err) {
      console.error('Erro ao carregar produtos:', err);
      grid.innerHTML = '<p style="color:var(--danger)">Erro ao carregar produtos. Verifique se o servidor está rodando.</p>';
    }
  }

  init();
</script>
</body>
</html>
