<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="site-logo">
      <img src="/img/logo/logoipsum-3.png" alt="MiniLoja" style="height:36px;width:auto;display:block;">
    </a>
    <nav class="header-nav">
      <a href="/track.html">Meus Pedidos</a>
      <button class="cart-btn" onclick="openDrawer()">
        🛒 Carrinho <span class="cart-count">0</span>
      </button>
    </nav>
  </div>
</header>

<!-- Cart Drawer -->
<div class="drawer-overlay" id="cart-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="cart-drawer">
  <div class="drawer-header">
    <h2>Carrinho</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="cart-body"></div>
  <div class="drawer-footer">
    <div class="cart-total" id="cart-total-row" style="display:flex;justify-content:space-between;font-weight:700;margin-bottom:.75rem">
      <span>Total</span><span id="cart-total"></span>
    </div>
    <a href="/checkout.html" id="cart-checkout-btn" class="btn btn-primary btn-full btn-lg" disabled>
      Finalizar Compra
    </a>
  </div>
</aside>

<main class="container page-content">
  <h1 class="section-title">Nossos Produtos</h1>
  <div class="products-grid" id="products-grid">
    <p style="color:var(--muted)">Carregando produtos…</p>
  </div>
</main>

<div id="toast"></div>

<script src="/js/cart.js"></script>
<script>
  let products = [];

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function renderProducts() {
    const grid = document.getElementById('products-grid');
    if (!products.length) {
      grid.innerHTML = '<p style="color:var(--muted)">Nenhum produto disponível.</p>';
      return;
    }

    grid.innerHTML = products.map(p => {
      const hasVariations = p.variations && p.variations.length > 0;
      const semEstoque = !hasVariations && p.stock <= 0;

      return `
        <div class="card product-card">
          <img src="${p.image_url || 'https://via.placeholder.com/400x220?text=Sem+Imagem'}" alt="${p.name}">
          <div class="product-card-body">
            <div class="product-card-name">${p.name}</div>
            ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
            <div class="product-card-price">${fmt(p.price)}</div>

            ${hasVariations ? `
              <div class="size-selector" id="sizes-${p.id}">
                ${p.variations.map(v => `
                  <button class="size-btn" data-pid="${p.id}" data-vid="${v.id}" data-label="${v.label}"
                    ${v.stock <= 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}
                    onclick="selectSize(this)">${v.label}</button>
                `).join('')}
              </div>
              <button class="btn btn-primary btn-full" onclick="addToCart(${p.id})" id="add-btn-${p.id}" disabled>
                Selecione um tamanho
              </button>
            ` : `
              <button class="btn btn-primary btn-full" onclick="addToCart(${p.id})"
                ${semEstoque ? 'disabled' : ''}>
                ${semEstoque ? 'Sem estoque' : 'Adicionar ao carrinho'}
              </button>
            `}
          </div>
        </div>
      `;
    }).join('');
  }

  function selectSize(btn) {
    const pid = btn.dataset.pid;
    document.querySelectorAll(`#sizes-${pid} .size-btn`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const addBtn = document.getElementById(`add-btn-${pid}`);
    addBtn.disabled = false;
    addBtn.textContent = 'Adicionar ao carrinho';
  }

  function addToCart(pid) {
    const p = products.find(x => x.id === pid);
    if (!p) return;
    const hasVariations = p.variations && p.variations.length > 0;

    if (hasVariations) {
      const selected = document.querySelector(`#sizes-${pid} .size-btn.selected`);
      if (!selected) return;
      addItem({ id: p.id, name: p.name, price: p.price, image: p.image_url,
        variationId: Number(selected.dataset.vid), variationLabel: selected.dataset.label });
    } else {
      addItem({ id: p.id, name: p.name, price: p.price, image: p.image_url });
    }
    updateCartUI();
    showToast(`${p.name} adicionado ao carrinho!`);
  }

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  async function load() {
    try {
      const res = await fetch('/api/products');
      products = await res.json();
      renderProducts();
    } catch {
      document.getElementById('products-grid').innerHTML =
        '<p style="color:var(--danger)">Erro ao carregar produtos.</p>';
    }
  }

  load();
</script>
</body>
</html>
