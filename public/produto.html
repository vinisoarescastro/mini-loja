<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produto — MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--border); }

    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    @media (max-width: 720px) {
      .product-layout { grid-template-columns: 1fr; gap: 1.25rem; }
    }

    /* ── Galeria ─────────────────────────────────────────────────────── */
    .gallery { position: sticky; top: 1rem; }
    .gallery-main {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      aspect-ratio: 1 / 1;
      cursor: zoom-in;
    }
    .gallery-main img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform .35s ease;
    }
    .gallery-main:hover img { transform: scale(1.04); }
    .gallery-badge {
      position: absolute; top: .75rem; left: .75rem;
      display: flex; flex-direction: column; gap: .35rem; z-index: 2;
    }
    .gallery-thumbs { display: flex; gap: .5rem; margin-top: .65rem; flex-wrap: wrap; }
    .gallery-thumb {
      width: 60px; height: 60px;
      object-fit: cover; border-radius: 8px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color .15s, transform .15s;
      flex-shrink: 0;
    }
    .gallery-thumb:hover  { border-color: var(--accent); }
    .gallery-thumb.active { border-color: var(--accent); transform: scale(1.05); }

    /* ── Info ───────────────────────────────────────────────────────── */
    .product-info { display: flex; flex-direction: column; gap: 0; }
    .product-category-tag {
      font-size: .72rem; color: var(--accent); font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: .35rem;
    }
    .product-title {
      font-size: 1.45rem; font-weight: 700;
      line-height: 1.3; color: var(--text); margin: 0 0 .5rem;
    }

    .price-block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.1rem 1.25rem; margin-bottom: 1.25rem;
    }
    .price-main { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: .3rem; }
    .price-installments { font-size: .9rem; color: var(--muted); }
    .price-installments strong { color: var(--accent); font-weight: 700; }
    .price-badge-free {
      display: inline-block; font-size: .72rem; font-weight: 700;
      background: #dcfce7; color: #16a34a; border-radius: 99px;
      padding: 2px 8px; margin-left: .4rem;
      text-transform: uppercase; letter-spacing: .04em;
    }

    .variations-section { margin-bottom: 1.25rem; }
    .variations-label { font-size: .88rem; font-weight: 600; color: var(--text); margin-bottom: .5rem; }
    .variations-label span { font-weight: 400; color: var(--muted); }
    .var-grid { display: flex; flex-wrap: wrap; gap: .45rem; }
    .var-btn {
      padding: .35rem .85rem; border: 2px solid var(--border);
      border-radius: 7px; background: var(--surface); font-size: .88rem;
      cursor: pointer; transition: all .15s; color: var(--text);
    }
    .var-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .var-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 600; }
    .var-btn:disabled { opacity: .38; cursor: not-allowed; }

    .stock-info { display: flex; align-items: center; gap: .4rem; font-size: .83rem; margin-bottom: 1.25rem; }
    .stock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stock-ok  { background: #22c55e; }
    .stock-low { background: #f97316; }
    .stock-out { background: #ef4444; }

    .actions { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 1.25rem; }
    .btn-add-cart {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .85rem 1.5rem; border-radius: 10px;
      font-size: 1rem; font-weight: 700;
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; transition: background .15s, transform .1s;
    }
    .btn-add-cart:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-add-cart:active:not(:disabled) { transform: translateY(0); }
    .btn-add-cart:disabled { opacity: .5; cursor: not-allowed; }
    .btn-add-cart svg { width: 18px; height: 18px; flex-shrink: 0; }

    .product-guarantees {
      display: flex; flex-direction: column; gap: .55rem;
      font-size: .83rem; color: var(--muted);
      border-top: 1px solid var(--border); padding-top: 1rem; margin-top: .25rem;
    }
    .guarantee-item { display: flex; align-items: center; gap: .5rem; }
    .guarantee-item svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--muted); }

    .desc-section { margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .desc-section h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
    .desc-content { font-size: .93rem; color: var(--muted); line-height: 1.65; white-space: pre-line; }

    .preorder-info {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 10px; padding: .75rem 1rem;
      font-size: .83rem; color: #92400e;
      display: flex; align-items: flex-start; gap: .5rem; margin-bottom: 1.25rem;
    }
    .preorder-info svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }

    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #fff;
      padding: .6rem 1.4rem; border-radius: 99px;
      font-size: .88rem; font-weight: 500;
      z-index: 9999; opacity: 0;
      transition: all .3s ease; pointer-events: none;
      white-space: nowrap; display: flex; align-items: center; gap: .45rem;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast svg { width: 15px; height: 15px; flex-shrink: 0; }

    .page-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
    .page-state .state-icon { display: flex; justify-content: center; margin-bottom: 1rem; }
    .page-state .state-icon svg { width: 48px; height: 48px; color: var(--border); }
    .page-state h2 { font-size: 1.25rem; font-weight: 600; color: var(--text); }

    .badge-chip {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .66rem; font-weight: 700; letter-spacing: .04em;
      padding: 3px 8px; border-radius: 99px; text-transform: uppercase;
    }
    .badge-chip svg { width: 10px; height: 10px; flex-shrink: 0; }
    .badge-chip.preorder  { background: #f59e0b; color: #fff; }
    .badge-chip.expired   { background: #94a3b8; color: #fff; }
    .badge-chip.out-stock { background: #ef4444; color: #fff; }
    .badge-chip.low-stock { background: #f97316; color: #fff; }

    .qty-section { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; }
    .qty-label { font-size: .88rem; font-weight: 600; color: var(--text); }
    .qty-control {
      display: flex; align-items: center; gap: 0;
      border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .qty-btn-ctrl {
      width: 36px; height: 36px; background: var(--surface); border: none;
      font-size: 1.1rem; cursor: pointer; color: var(--text);
      transition: background .12s; display: flex; align-items: center; justify-content: center;
    }
    .qty-btn-ctrl:hover { background: var(--bg); }
    .qty-num {
      width: 40px; text-align: center; font-size: .95rem; font-weight: 600;
      border: none; background: transparent; color: var(--text);
    }
    .qty-num::-webkit-inner-spin-button,
    .qty-num::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>

<div id="header-root"></div>

<div class="drawer-overlay" id="cart-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="cart-drawer">
  <div class="drawer-header">
    <h2>Carrinho</h2>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="cart-body"></div>
  <div class="drawer-footer">
    <div class="cart-total" id="cart-total-row"
         style="display:flex;justify-content:space-between;font-weight:700;margin-bottom:.75rem">
      <span>Total</span><span id="cart-total"></span>
    </div>
    <a href="/checkout.html" id="cart-checkout-btn" class="btn btn-primary btn-full btn-lg">
      Finalizar Compra
    </a>
  </div>
</aside>

<main class="container page-content" id="page-main">
  <div class="page-state">
    <div class="state-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
    </div>
    <h2>Carregando produto…</h2>
  </div>
</main>

<div id="toast"></div>

<script src="/js/site-config.js"></script>
<script src="/js/header.js"></script>
<script src="/js/cart.js"></script>
<script>
  renderHeader({ showCart: true });

  // ── SVG library ───────────────────────────────────────────────────────────────
  const SVG = {
    cart:    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`,
    package: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
    clock:   `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    ban:     `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`,
    lock:    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
    message: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
    search:  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    alert:   `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    check:   `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    options: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  };

  // ── Helpers ───────────────────────────────────────────────────────────────────
  const INSTALL_COUNT = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.installments) || 6;

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  function fmtInstallment(price) {
    return `${INSTALL_COUNT}x de <strong>${fmt(price / INSTALL_COUNT)}</strong> <span class="price-badge-free">sem juros</span>`;
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
    });
  }

  function showToast(msg, iconKey = 'check') {
    const t = document.getElementById('toast');
    t.innerHTML = `${SVG[iconKey]}${msg}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Estado ───────────────────────────────────────────────────────────────────
  let product     = null;
  let selectedVar = null;
  let quantity    = 1;

  // ── Galeria ──────────────────────────────────────────────────────────────────
  function setActiveImage(idx) {
    const mainImg = document.getElementById('gallery-main-img');
    const thumbs  = document.querySelectorAll('.gallery-thumb');
    const imgs    = product.images?.length ? product.images : [product.image_url].filter(Boolean);
    if (mainImg && imgs[idx]) mainImg.src = imgs[idx];
    thumbs.forEach((t, i) => t.classList.toggle('active', i === idx));
  }

  // ── Variações ────────────────────────────────────────────────────────────────
  function selectVar(varObj) {
    selectedVar = varObj;
    document.querySelectorAll('.var-btn').forEach(b => {
      b.classList.toggle('selected', Number(b.dataset.vid) === varObj.id);
    });
    updateStockInfo();
    updateBtnState();
    const lbl = document.getElementById('selected-var-label');
    if (lbl) lbl.textContent = selectedVar ? `: ${selectedVar.label}` : '';
  }

  function updateStockInfo() {
    const el = document.getElementById('stock-info');
    if (!el) return;
    if (product.preorder_expired) {
      el.innerHTML = `<span class="stock-dot stock-out"></span> <span style="color:#ef4444">Encomendas encerradas</span>`;
      return;
    }
    if (product.made_to_order) {
      el.innerHTML = `<span class="stock-dot stock-ok"></span> Sob encomenda`;
      return;
    }
    let qty;
    if (selectedVar) {
      qty = selectedVar.stock;
    } else if (product.variations?.length) {
      el.innerHTML = `<span class="stock-dot stock-ok"></span> Selecione uma opção`;
      return;
    } else {
      qty = product.stock;
    }
    if (qty <= 0)      el.innerHTML = `<span class="stock-dot stock-out"></span> <span style="color:#ef4444">Sem estoque</span>`;
    else if (qty <= 5) el.innerHTML = `<span class="stock-dot stock-low"></span> <span style="color:#f97316">Últimas ${qty} unidades</span>`;
    else               el.innerHTML = `<span class="stock-dot stock-ok"></span> <span style="color:#16a34a">Em estoque</span>`;
  }

  function updateBtnState() {
    const btn = document.getElementById('btn-add-cart');
    if (!btn) return;
    const isMTO   = product.made_to_order;
    const expired = product.preorder_expired;

    if (expired) {
      btn.disabled = true;
      btn.innerHTML = `${SVG.ban} Encomendas Encerradas`;
      return;
    }
    if (!isMTO) {
      let qty;
      if (product.variations?.length) {
        if (!selectedVar) {
          btn.disabled = true;
          btn.innerHTML = `${SVG.options} Selecione uma opção`;
          return;
        }
        qty = selectedVar.stock;
      } else {
        qty = product.stock;
      }
      if (qty <= 0) {
        btn.disabled = true;
        btn.innerHTML = `${SVG.ban} Indisponível`;
        return;
      }
    }
    btn.disabled = false;
    if (isMTO) {
      btn.innerHTML = `${SVG.package} Pedir sob Encomenda`;
      btn.style.background = '#f59e0b';
    } else {
      btn.innerHTML = `${SVG.cart} Adicionar ao Carrinho`;
      btn.style.background = '';
    }
  }

  // ── Quantidade ───────────────────────────────────────────────────────────────
  function changeQty(delta) {
    quantity = Math.max(1, quantity + delta);
    const el = document.getElementById('qty-display');
    if (el) el.value = quantity;
  }

  // ── Adicionar ao carrinho ────────────────────────────────────────────────────
  function doAddToCart() {
    if (!product) return;
    if (product.preorder_expired) return; // guard extra — botão já está disabled
    if (product.variations?.length && !selectedVar) {
      showToast('Selecione uma opção!', 'alert');
      return;
    }
    addToCart({
      productId:      product.id,
      productName:    product.name,
      price:          product.price,
      quantity,
      variationId:    selectedVar?.id    || null,
      variationLabel: selectedVar?.label || null,
      image:          product.image_url  || (product.images?.[0]) || null,
    });
    showToast('Adicionado ao carrinho!', 'check');
    setTimeout(() => { window.location.href = '/'; }, 900);
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderProduct(p) {
    product = p;
    const imgs    = p.images?.length ? p.images : [p.image_url].filter(Boolean);
    const hasVars = p.variations?.length > 0;
    const isMTO   = p.made_to_order;
    const expired = p.preorder_expired;

    document.title = `${p.name} — ${typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG.siteName : 'MiniLoja'}`;

    let badgesHTML = '';
    if (isMTO && !expired) badgesHTML += `<span class="badge-chip preorder">${SVG.package} Encomenda</span>`;
    if (expired)            badgesHTML += `<span class="badge-chip expired">${SVG.clock} Encerrado</span>`;

    const thumbsHTML = imgs.length > 1
      ? imgs.map((url, i) => `
          <img src="${url}" alt="Imagem ${i + 1}"
               class="gallery-thumb ${i === 0 ? 'active' : ''}"
               onclick="setActiveImage(${i})"
               onerror="this.style.display='none'">`).join('')
      : '';

    let varsHTML = '';
    if (hasVars) {
      varsHTML = `
        <div class="variations-section">
          <div class="variations-label">Opção<span id="selected-var-label"></span></div>
          <div class="var-grid">
            ${p.variations.map(v => `
              <button class="var-btn" data-vid="${v.id}"
                ${!isMTO && v.stock <= 0 ? 'disabled title="Sem estoque"' : ''}
                onclick="selectVar(${JSON.stringify(v).replace(/"/g, '&quot;')})">
                ${v.label}
              </button>`).join('')}
          </div>
        </div>`;
    }

    let preorderHTML = '';
    if (isMTO && p.preorder_deadline && !expired) {
      preorderHTML = `
        <div class="preorder-info">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          Encomendas abertas até <strong>${fmtDate(p.preorder_deadline)}</strong>. Após esta data, não será possível realizar pedidos.
        </div>`;
    }
    if (expired) {
      preorderHTML = `
        <div class="preorder-info" style="background:#f1f5f9;border-color:#cbd5e1;color:#64748b">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          As encomendas foram encerradas em <strong>${fmtDate(p.preorder_deadline)}</strong>.
        </div>`;
    }

    document.getElementById('page-main').innerHTML = `
      <div class="product-page">
        <nav class="breadcrumb">
          <a href="/">Início</a>
          <span class="breadcrumb-sep">›</span>
          ${p.category_name ? `<a href="/?cat=${p.category_id}">${p.category_name}</a><span class="breadcrumb-sep">›</span>` : ''}
          <span>${p.name}</span>
        </nav>

        <div class="product-layout">
          <div class="gallery">
            <div class="gallery-main" id="gallery-main">
              ${badgesHTML ? `<div class="gallery-badge">${badgesHTML}</div>` : ''}
              <img id="gallery-main-img" src="${imgs[0] || ''}" alt="${p.name}" onerror="this.style.opacity='.3'">
            </div>
            ${thumbsHTML ? `<div class="gallery-thumbs">${thumbsHTML}</div>` : ''}
          </div>

          <div class="product-info">
            ${p.category_name ? `<div class="product-category-tag">${p.category_name}</div>` : ''}
            <h1 class="product-title">${p.name}</h1>

            <div class="price-block">
              <div class="price-main">${fmt(p.price)}</div>
              <div class="price-installments">ou ${fmtInstallment(p.price)}</div>
            </div>

            ${preorderHTML}
            ${varsHTML}
            <div class="stock-info" id="stock-info"></div>

            <div class="qty-section">
              <span class="qty-label">Quantidade</span>
              <div class="qty-control">
                <button class="qty-btn-ctrl" onclick="changeQty(-1)" aria-label="Diminuir">−</button>
                <input id="qty-display" class="qty-num" type="number" value="1" min="1" readonly>
                <button class="qty-btn-ctrl" onclick="changeQty(1)" aria-label="Aumentar">+</button>
              </div>
            </div>

            <div class="actions">
              <button class="btn-add-cart" id="btn-add-cart" onclick="doAddToCart()">
                ${SVG.cart} Adicionar ao Carrinho
              </button>
            </div>

            <div class="product-guarantees">
              <div class="guarantee-item">
                ${SVG.lock}<span>Compra 100% segura</span>
              </div>
              <div class="guarantee-item">
                ${SVG.package}<span>Embalagem com cuidado</span>
              </div>
              <div class="guarantee-item">
                ${SVG.message}<span>Suporte ao cliente</span>
              </div>
            </div>
          </div>
        </div>

        ${p.description ? `
          <div class="desc-section">
            <h2>Descrição do Produto</h2>
            <div class="desc-content">${p.description}</div>
          </div>` : ''}
      </div>
    `;

    updateStockInfo();
    updateBtnState();
    if (hasVars && p.variations.length === 1) selectVar(p.variations[0]);
  }

  // ── Load ─────────────────────────────────────────────────────────────────────
  async function loadProduct() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
      document.getElementById('page-main').innerHTML = `
        <div class="page-state">
          <div class="state-icon">${SVG.search}</div>
          <h2>Produto não encontrado</h2>
          <p style="margin-top:.5rem;color:var(--muted)">Nenhum ID de produto foi informado.</p>
          <a href="/" class="btn btn-primary" style="margin-top:1.5rem;display:inline-flex">← Voltar à loja</a>
        </div>`;
      return;
    }
    try {
      const res = await fetch(`/api/products/${id}`);
      if (!res.ok) throw new Error();
      renderProduct(await res.json());
    } catch {
      document.getElementById('page-main').innerHTML = `
        <div class="page-state">
          <div class="state-icon">${SVG.alert}</div>
          <h2>Produto não encontrado</h2>
          <p style="margin-top:.5rem;color:var(--muted)">Este produto não existe ou foi removido.</p>
          <a href="/" class="btn btn-primary" style="margin-top:1.5rem;display:inline-flex">← Voltar à loja</a>
        </div>`;
    }
  }

  loadProduct();
</script>
</body>
</html>
