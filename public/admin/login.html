<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Admin MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/img/logo/logo_inf_colorido.png" alt="MiniLoja" style="height:48px;width:auto;margin:0 auto 1.5rem;">
    </div>
    <h1 style="text-align:center;font-size:1.1rem;margin-bottom:1.5rem;color:#64748b">Painel Administrativo</h1>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="admin@miniloja.com" autofocus>
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <div class="form-error" id="err-login" style="margin-bottom:.75rem;text-align:center"></div>
    <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<script>
  // Redirect if already logged in
  fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/admin/index.html'; });

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err      = document.getElementById('err-login');
    const btn      = document.getElementById('login-btn');
    err.textContent = '';

    if (!email || !password) { err.textContent = 'Preencha todos os campos.'; return; }

    btn.disabled = true; btn.textContent = 'Entrando…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao entrar');
      window.location.href = '/admin/index.html';
    } catch (e) {
      err.textContent = e.message;
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
