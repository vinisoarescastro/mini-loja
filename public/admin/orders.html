<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — Admin MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .order-item-row {
      display: grid;
      grid-template-columns: 1fr 130px 100px 90px auto;
      gap: .5rem;
      align-items: center;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: .5rem .65rem;
      margin-bottom: .4rem;
    }
    .order-item-row select,
    .order-item-row input { font-size: .82rem; }

    .icon-btn {
      display: inline-flex; align-items: center; gap: .35rem;
    }
    .icon-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .lookup-hint {
      font-size: .8rem; color: #6366f1;
      margin: -.3rem 0 .6rem;
      display: none;
      align-items: center; gap: .3rem;
    }
    .lookup-hint svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
<div class="admin-wrapper">
  <div id="sidebar-root"></div>
  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Pedidos</h1>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-secondary icon-btn" onclick="exportOrders()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Exportar CSV
        </button>
        <button class="btn btn-primary" onclick="openNewOrderModal()">+ Novo Pedido</button>
      </div>
    </div>
    <div class="admin-content">
      <div class="table-wrap">
        <div class="table-header">
          <div class="filters">
            <input type="text" id="f-search" placeholder="Buscar código, cliente…" oninput="debounceLoad()">
            <select id="f-pay" onchange="loadOrders()">
              <option value="">Todos pagamentos</option>
              <option value="PENDING">Aguardando</option>
              <option value="APPROVED">Aprovado</option>
              <option value="REJECTED">Recusado</option>
            </select>
            <select id="f-order" onchange="loadOrders()">
              <option value="">Todos status</option>
              <option value="PENDING">Pendente</option>
              <option value="CONFIRMED">Confirmado</option>
              <option value="PREPARING">Preparando</option>
              <option value="SHIPPED">Enviado</option>
              <option value="DELIVERED">Entregue</option>
              <option value="CANCELLED">Cancelado</option>
            </select>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr>
              <th>Código</th><th>Cliente</th><th>WhatsApp</th>
              <th>Total</th><th>Pagamento</th><th>Status</th><th>Data</th><th></th>
            </tr></thead>
            <tbody id="orders-body">
              <tr><td colspan="8" class="table-empty">Carregando…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal detalhes ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modal-title">Pedido</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ── Modal novo pedido ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="new-order-modal" style="display:none" onclick="if(event.target===this)closeNewOrderModal()">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:640px">
    <div class="modal-header">
      <h2>Novo Pedido</h2>
      <button class="modal-close" onclick="closeNewOrderModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">

      <!-- Cliente -->
      <div style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:.6rem">Cliente</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Nome *</label>
          <input type="text" id="no-cname" placeholder="João Silva">
        </div>
        <div class="form-group">
          <label>Telefone *</label>
          <input type="tel" id="no-cphone" placeholder="(11) 99999-9999"
                 oninput="maskPhoneInline(this)" maxlength="15"
                 onblur="lookupCustomer()">
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="no-cemail" placeholder="joao@exemplo.com">
        </div>
        <div class="form-group">
          <label>CPF</label>
          <input type="text" id="no-ccpf" placeholder="000.000.000-00"
                 oninput="maskCPFInline(this)" maxlength="14" inputmode="numeric">
        </div>
      </div>
      <div id="customer-lookup-hint" class="lookup-hint">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="lookup-hint-text"></span>
      </div>

      <!-- Itens -->
      <div style="border-top:1px solid #f1f5f9;padding-top:.9rem;margin-top:.4rem">
        <div style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:.6rem">Itens do Pedido</div>
        <div style="display:grid;grid-template-columns:1fr 130px 100px 90px auto;gap:.5rem;font-size:.72rem;font-weight:600;color:#94a3b8;padding:0 .65rem .3rem;text-transform:uppercase;letter-spacing:.04em">
          <span>Produto</span><span>Variação</span><span>Preço Unit.</span><span>Qtd</span><span></span>
        </div>
        <div id="order-items-list"></div>
        <button type="button" class="btn btn-secondary" style="font-size:.82rem;padding:.35rem .75rem;margin-top:.3rem" onclick="addOrderItemRow()">
          + Adicionar item
        </button>
      </div>

      <!-- Status -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.75rem;border-top:1px solid #f1f5f9;padding-top:.9rem">
        <div class="form-group" style="margin:0">
          <label style="font-size:.82rem">Status do Pedido</label>
          <select id="no-ostatus">
            <option value="CONFIRMED">Confirmado</option>
            <option value="PENDING">Pendente</option>
            <option value="PREPARING">Preparando</option>
            <option value="SHIPPED">Enviado</option>
            <option value="DELIVERED">Entregue</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label style="font-size:.82rem">Status de Pagamento</label>
          <select id="no-pstatus">
            <option value="APPROVED">Aprovado</option>
            <option value="PENDING">Aguardando</option>
            <option value="REJECTED">Recusado</option>
          </select>
        </div>
      </div>

      <div style="margin-top:.75rem;text-align:right;font-size:.9rem;font-weight:600">
        Total: <span id="order-total-preview">R$ 0,00</span>
      </div>
      <div class="form-error" id="err-new-order" style="margin-top:.5rem"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeNewOrderModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-new-order" onclick="saveNewOrder()">Criar Pedido</button>
    </div>
  </div>
</div>

<script src="/admin/js/admin.js"></script>
<script src="/admin/js/sidebar.js"></script>
<script>
  document.getElementById('sidebar-root').innerHTML = sidebarHTML();

  let currentPage = 1, currentOrderId = null, debounceTimer;
  let allProducts = [];

  function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadOrders, 400);
  }

  // ── Exportar CSV ───────────────────────────────────────────────────────────
  function exportOrders() {
    const params = new URLSearchParams({
      search:        document.getElementById('f-search').value,
      paymentStatus: document.getElementById('f-pay').value,
      orderStatus:   document.getElementById('f-order').value,
    });
    window.location.href = `/api/admin/orders/export?${params}`;
  }

  // ── Listar pedidos ─────────────────────────────────────────────────────────
  async function loadOrders(page = 1) {
    currentPage = page;
    const params = new URLSearchParams({
      page,
      search:        document.getElementById('f-search').value,
      paymentStatus: document.getElementById('f-pay').value,
      orderStatus:   document.getElementById('f-order').value,
    });
    const res  = await fetch(`/api/admin/orders?${params}`);
    const data = await res.json();

    document.getElementById('orders-body').innerHTML = data.orders.map(o => `
      <tr>
        <td><strong>${o.code}</strong></td>
        <td>${o.customer_name}</td>
        <td>${o.customer_phone}</td>
        <td>${fmt(o.total)}</td>
        <td><span class="${badgeClass(o.payment_status)}">${PAY_LABEL[o.payment_status]||o.payment_status}</span></td>
        <td><span class="${badgeClass(o.order_status)}">${STATUS_LABEL[o.order_status]||o.order_status}</span></td>
        <td>${fmtDate(o.created_at)}</td>
        <td><button class="btn btn-secondary" style="padding:.3rem .75rem;font-size:.8rem" onclick="openOrder(${o.id})">Detalhes</button></td>
      </tr>
    `).join('') || `<tr><td colspan="8" class="table-empty">Nenhum pedido encontrado</td></tr>`;

    const pag = document.getElementById('pagination');
    pag.innerHTML = '';
    for (let i = 1; i <= data.pages; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === page ? ' active' : '');
      btn.textContent = i;
      btn.onclick = () => loadOrders(i);
      pag.appendChild(btn);
    }
  }

  // ── Modal detalhes ─────────────────────────────────────────────────────────
  async function openOrder(id) {
    currentOrderId = id;
    const res = await fetch(`/api/admin/orders/${id}`);
    const o   = await res.json();
    document.getElementById('modal-title').textContent = `Pedido ${o.code}`;
    document.getElementById('modal-body').innerHTML = `
      <p style="margin-bottom:.75rem;font-size:.875rem;color:#64748b">${fmtDate(o.created_at)}</p>
      <p><strong>Cliente:</strong> ${o.customer_name}</p>
      <p><strong>Telefone:</strong> ${o.customer_phone}</p>
      ${o.customer_email ? `<p><strong>E-mail:</strong> ${o.customer_email}</p>` : ''}
      ${o.customer_cpf   ? `<p><strong>CPF:</strong> ${formatCPF(o.customer_cpf)}</p>` : ''}
      <hr style="margin:1rem 0;border:none;border-top:1px solid #e2e8f0">
      <strong>Itens:</strong>
      <table style="width:100%;margin-top:.5rem;font-size:.875rem">
        ${o.items.map(i => `
          <tr>
            <td>${i.product_name}${i.variation_label ? ` <span style="color:#64748b">(${i.variation_label})</span>` : ''}</td>
            <td style="text-align:center;color:#64748b">× ${i.quantity}</td>
            <td style="text-align:right;font-weight:600">${fmt(i.unit_price * i.quantity)}</td>
          </tr>
        `).join('')}
        <tr style="border-top:1px solid #e2e8f0">
          <td colspan="2" style="padding-top:.5rem;font-weight:700">Total</td>
          <td style="padding-top:.5rem;text-align:right;font-weight:700;color:var(--accent)">${fmt(o.total)}</td>
        </tr>
      </table>
      <hr style="margin:1rem 0;border:none;border-top:1px solid #e2e8f0">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div>
          <label style="font-size:.8rem;font-weight:600;color:#64748b;display:block;margin-bottom:.3rem">Pagamento</label>
          <select id="edit-pay" style="width:100%">
            ${['PENDING','APPROVED','REJECTED','REFUNDED'].map(s =>
              `<option value="${s}" ${o.payment_status===s?'selected':''}>${PAY_LABEL[s]||s}</option>`
            ).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:.8rem;font-weight:600;color:#64748b;display:block;margin-bottom:.3rem">Status</label>
          <select id="edit-status" style="width:100%">
            ${['PENDING','CONFIRMED','PREPARING','SHIPPED','DELIVERED','CANCELLED'].map(s =>
              `<option value="${s}" ${o.order_status===s?'selected':''}>${STATUS_LABEL[s]||s}</option>`
            ).join('')}
          </select>
        </div>
      </div>
    `;
    document.getElementById('modal-footer').innerHTML = `
      <button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
      <button class="btn btn-primary" onclick="saveOrder()">Salvar</button>
    `;
    document.getElementById('modal').style.display = 'flex';
  }

  function formatCPF(cpf) {
    const d = String(cpf).replace(/\D/g, '');
    return d.length === 11 ? d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') : cpf;
  }

  async function saveOrder() {
    const payment_status = document.getElementById('edit-pay').value;
    const order_status   = document.getElementById('edit-status').value;
    await fetch(`/api/admin/orders/${currentOrderId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ payment_status, order_status }),
    });
    closeModal();
    loadOrders(currentPage);
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    currentOrderId = null;
  }

  // ── Novo Pedido ────────────────────────────────────────────────────────────
  async function openNewOrderModal() {
    await requireAdmin();
    if (!allProducts.length) {
      const res = await fetch('/api/products');
      allProducts = await res.json();
    }
    document.getElementById('no-cname').value  = '';
    document.getElementById('no-cphone').value = '';
    document.getElementById('no-cemail').value = '';
    document.getElementById('no-ccpf').value   = '';
    document.getElementById('order-items-list').innerHTML = '';
    document.getElementById('err-new-order').textContent  = '';
    document.getElementById('customer-lookup-hint').style.display = 'none';
    document.getElementById('order-total-preview').textContent = 'R$ 0,00';
    addOrderItemRow();
    document.getElementById('new-order-modal').style.display = 'flex';
  }

  function closeNewOrderModal() {
    document.getElementById('new-order-modal').style.display = 'none';
  }

  function maskPhoneInline(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 11);
    v = v.length <= 10
      ? v.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3')
      : v.replace(/^(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
    input.value = v;
  }

  function maskCPFInline(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 11);
    input.value = v.replace(/^(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
  }

  async function lookupCustomer() {
    const phone = document.getElementById('no-cphone').value.replace(/\D/g, '');
    if (phone.length < 10) return;
    const hint = document.getElementById('customer-lookup-hint');
    const res  = await fetch(`/api/admin/customers?search=${phone}&page=1`);
    const data = await res.json();
    const found = data.customers.find(c => c.phone.replace(/\D/g,'') === phone);
    if (found) {
      document.getElementById('no-cname').value  = found.name;
      document.getElementById('no-cemail').value = found.email || '';
      document.getElementById('no-ccpf').value   = found.cpf
        ? found.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') : '';
      document.getElementById('lookup-hint-text').textContent = `Cliente encontrado: ${found.name}`;
      hint.style.display = 'flex';
    } else {
      hint.style.display = 'none';
    }
  }

  function addOrderItemRow() {
    const list = document.getElementById('order-items-list');
    const row  = document.createElement('div');
    row.className = 'order-item-row';

    const productOptions = allProducts.map(p =>
      `<option value="${p.id}" data-price="${p.price}"
               data-variations='${JSON.stringify(p.variations || []).replace(/'/g,'&#39;')}'
               data-mto="${p.made_to_order ? '1' : '0'}">${p.name}</option>`
    ).join('');

    row.innerHTML = `
      <select onchange="onProductChange(this)">
        <option value="">— Produto —</option>
        ${productOptions}
      </select>
      <select class="var-select"><option value="">— Variação —</option></select>
      <input type="text" class="price-input" placeholder="0,00" oninput="maskPriceInline(this);updateOrderTotal()">
      <input type="number" class="qty-input" value="1" min="1" oninput="updateOrderTotal()">
      <button type="button" onclick="this.parentElement.remove();updateOrderTotal()"
        style="background:none;border:none;color:var(--danger);cursor:pointer;padding:0 .25rem;display:flex;align-items:center">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    `;
    list.appendChild(row);
  }

  function onProductChange(sel) {
    const opt     = sel.selectedOptions[0];
    const price   = opt?.dataset?.price || '';
    const varsSel = sel.parentElement.querySelector('.var-select');
    const priceIn = sel.parentElement.querySelector('.price-input');

    let vars = [];
    try { vars = JSON.parse(opt?.dataset?.variations || '[]'); } catch(_) {}

    priceIn.value = price ? String(parseFloat(price).toFixed(2)).replace('.', ',') : '';

    varsSel.innerHTML = vars.length
      ? `<option value="">— Variação —</option>` + vars.map(v => `<option value="${v.id}">${v.label}</option>`).join('')
      : `<option value="">Sem variação</option>`;

    updateOrderTotal();
  }

  function maskPriceInline(input) {
    let v = input.value.replace(/[^\d,]/g, '');
    const parts = v.split(',');
    if (parts.length > 2) v = parts[0] + ',' + parts.slice(1).join('');
    input.value = v;
  }

  function parsePriceInput(str) {
    return parseFloat((str || '0').replace(/\./g, '').replace(',', '.')) || 0;
  }

  function updateOrderTotal() {
    let total = 0;
    document.querySelectorAll('#order-items-list .order-item-row').forEach(row => {
      const price = parsePriceInput(row.querySelector('.price-input').value);
      const qty   = parseInt(row.querySelector('.qty-input').value) || 1;
      total += price * qty;
    });
    document.getElementById('order-total-preview').textContent =
      new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(total);
  }

  async function saveNewOrder() {
    document.getElementById('err-new-order').textContent = '';
    const name  = document.getElementById('no-cname').value.trim();
    const phone = document.getElementById('no-cphone').value.replace(/\D/g, '');
    const email = document.getElementById('no-cemail').value.trim();
    const cpf   = document.getElementById('no-ccpf').value.replace(/\D/g, '');
    const oSt   = document.getElementById('no-ostatus').value;
    const pSt   = document.getElementById('no-pstatus').value;

    if (!name || phone.length < 10) {
      document.getElementById('err-new-order').textContent = 'Nome e telefone do cliente são obrigatórios.';
      return;
    }

    const rows = document.querySelectorAll('#order-items-list .order-item-row');
    if (!rows.length) {
      document.getElementById('err-new-order').textContent = 'Adicione pelo menos um item.';
      return;
    }

    const items = Array.from(rows).map(row => {
      const productSel = row.querySelector('select');
      const varSel     = row.querySelector('.var-select');
      const price      = parsePriceInput(row.querySelector('.price-input').value);
      const qty        = parseInt(row.querySelector('.qty-input').value) || 1;
      return {
        product_id:   parseInt(productSel.value),
        variation_id: varSel.value ? parseInt(varSel.value) : null,
        unit_price:   price,
        quantity:     qty,
      };
    });

    const btn = document.getElementById('btn-save-new-order');
    btn.disabled = true; btn.textContent = 'Criando…';

    const res = await fetch('/api/admin/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customer: { name, phone, email: email || null, cpf: cpf || null },
        items,
        order_status:   oSt,
        payment_status: pSt,
      }),
    });
    const data = await res.json();
    btn.disabled = false; btn.textContent = 'Criar Pedido';

    if (!res.ok) {
      document.getElementById('err-new-order').textContent = data.error || 'Erro ao criar pedido.';
      return;
    }
    closeNewOrderModal();
    loadOrders(1);
  }

  loadOrders();
</script>
</body>
</html>
