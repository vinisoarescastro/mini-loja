<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — Admin MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<div class="admin-wrapper">
  <div id="sidebar-root"></div>
  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Usuários Admin</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Novo Usuário</button>
    </div>
    <div class="admin-content">
      <div class="table-wrap">
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Nome</th><th>E-mail</th><th>Papel</th><th>Status</th><th></th></tr></thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>Novo Usuário</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Nome *</label><input type="text" id="u-name"></div>
      <div class="form-group"><label>E-mail *</label><input type="email" id="u-email"></div>
      <div class="form-group"><label>Senha *</label><input type="password" id="u-password"></div>
      <div class="form-group">
        <label>Papel</label>
        <select id="u-role">
          <option value="VIEWER">Visualizador</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>
      <div class="form-error" id="err-user"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="createUser()">Criar</button>
    </div>
  </div>
</div>

<script src="/admin/js/admin.js"></script>
<script src="/admin/js/sidebar.js"></script>
<script>
  document.getElementById('sidebar-root').innerHTML = sidebarHTML();
  let me;

  async function loadUsers() {
    me = await requireAdmin();
    const res = await fetch('/api/admin/users');
    const users = await res.json();

    document.getElementById('users-body').innerHTML = users.map(u => `
      <tr>
        <td><strong>${u.name}</strong></td>
        <td>${u.email}</td>
        <td>
          <select onchange="updateRole(${u.id}, this.value)" ${u.id===me.id?'disabled':''}>
            <option value="VIEWER"${u.role==='VIEWER'?' selected':''}>Visualizador</option>
            <option value="ADMIN"${u.role==='ADMIN'?' selected':''}>Administrador</option>
          </select>
        </td>
        <td><span class="badge ${u.active?'badge-approved':'badge-rejected'}">${u.active?'Ativo':'Inativo'}</span></td>
        <td style="display:flex;gap:.4rem">
          ${u.id!==me.id ? `
            <button class="btn btn-secondary" style="padding:.3rem .75rem;font-size:.8rem"
              onclick="toggleActive(${u.id}, ${u.active})">${u.active?'Desativar':'Ativar'}</button>
          ` : '<span style="font-size:.8rem;color:#94a3b8">Você</span>'}
        </td>
      </tr>
    `).join('');
  }

  async function updateRole(id, role) {
    await fetch(`/api/admin/users/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role }),
    });
  }

  async function toggleActive(id, current) {
    await fetch(`/api/admin/users/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: !current }),
    });
    loadUsers();
  }

  function openModal() {
    document.getElementById('u-name').value = '';
    document.getElementById('u-email').value = '';
    document.getElementById('u-password').value = '';
    document.getElementById('err-user').textContent = '';
    document.getElementById('modal').style.display = 'flex';
  }

  async function createUser() {
    const name     = document.getElementById('u-name').value.trim();
    const email    = document.getElementById('u-email').value.trim();
    const password = document.getElementById('u-password').value;
    const role     = document.getElementById('u-role').value;
    const err      = document.getElementById('err-user');
    err.textContent = '';

    if (!name || !email || !password) { err.textContent = 'Preencha todos os campos.'; return; }

    const res = await fetch('/api/admin/users', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, role }),
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Erro ao criar.'; return; }
    closeModal();
    loadUsers();
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  loadUsers();
</script>
</body>
</html>
