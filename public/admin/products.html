<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Admin MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    /* ── Image Uploader ─────────────────────────────────────────────────── */
    .img-uploader {
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      padding: 1rem;
      background: #f8fafc;
      transition: border-color .2s, background .2s;
      cursor: pointer;
    }
    .img-uploader.drag-over { border-color: var(--accent, #6366f1); background: #eef2ff; }
    .img-grid { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .6rem; }
    .img-thumb {
      position: relative; width: 76px; height: 76px;
      border-radius: 8px; overflow: hidden;
      border: 2px solid #e2e8f0; flex-shrink: 0; background: #f1f5f9;
    }
    .img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-thumb-remove {
      position: absolute; top: 3px; right: 3px;
      width: 20px; height: 20px;
      background: rgba(0,0,0,.6); color: #fff;
      border: none; border-radius: 50%;
      font-size: 11px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .img-thumb-badge {
      position: absolute; bottom: 3px; left: 3px;
      background: rgba(99,102,241,.85); color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 1px 5px; border-radius: 4px;
    }
    .img-add-tile {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 76px; height: 76px;
      border: 2px dashed #cbd5e1; border-radius: 8px;
      cursor: pointer; color: #94a3b8;
      font-size: .68rem; gap: 3px; background: #fff;
      transition: border-color .15s, color .15s; flex-shrink: 0; user-select: none;
    }
    .img-add-tile:hover { border-color: var(--accent, #6366f1); color: var(--accent, #6366f1); }
    .img-add-tile-icon { font-size: 1.3rem; line-height: 1; }
    .img-hint { font-size: .75rem; color: #94a3b8; text-align: center; padding: .25rem 0 .1rem; }
    .img-count { font-weight: 600; color: #475569; }
    .img-count.at-limit { color: #ef4444; }

    /* ── Encomenda ──────────────────────────────────────────────────────── */
    .preorder-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-top: .5rem;
    }
    .badge-mto {
      display: inline-block;
      background: #f59e0b; color: #fff;
      font-size: .7rem; font-weight: 700;
      padding: 2px 7px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: .04em;
      margin-left: .4rem;
    }

    /* ── Tabela produto ─────────────────────────────────────────────────── */
    .product-thumb {
      width: 44px; height: 44px; object-fit: cover;
      border-radius: 6px; border: 1px solid #e2e8f0; display: block;
    }
    .product-thumb-placeholder {
      width: 44px; height: 44px; border-radius: 6px;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center; color: #94a3b8;
    }
    .product-thumb-placeholder svg { width: 20px; height: 20px; }

    .stock-btn {
      background: none; border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .85rem; padding: .15rem .3rem; border-radius: 4px;
      transition: background .15s;
    }
    .stock-btn:hover { background: #f1f5f9; }
    .stock-btn svg { width: 13px; height: 13px; color: #64748b; flex-shrink: 0; }
    .stock-btn.warn { color: var(--danger); font-weight: 600; }
    .stock-btn.warn svg { color: var(--danger); }

    .action-cell { display: flex; gap: .35rem; align-items: center; }
    .action-cell button { display: inline-flex; align-items: center; gap: .3rem; font-size: .8rem; padding: .3rem .65rem; }
    .action-cell button svg { width: 13px; height: 13px; }

    /* ── Modal estoque por variação ─────────────────────────────────────── */
    #stock-modal .modal { max-width: 440px; }
    .var-sales-table { width: 100%; font-size: .875rem; border-collapse: collapse; margin-top: .5rem; }
    .var-sales-table th { text-align: left; font-size: .75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; padding: .4rem .5rem; border-bottom: 1px solid #e2e8f0; }
    .var-sales-table td { padding: .5rem .5rem; border-bottom: 1px solid #f1f5f9; }
    .var-sales-table tr:last-child td { border-bottom: none; font-weight: 700; }
    .sold-chip {
      display: inline-block; background: #dcfce7; color: #16a34a;
      font-size: .75rem; font-weight: 700;
      padding: 1px 7px; border-radius: 99px;
    }
  </style>
</head>
<body>
<div class="admin-wrapper">
  <div id="sidebar-root"></div>
  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Produtos</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Novo Produto</button>
    </div>
    <div class="admin-content">
      <div class="table-wrap">
        <div style="overflow-x:auto">
          <table>
            <thead><tr>
              <th style="width:56px"></th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Estoque / Vendidos</th>
              <th>Variações</th>
              <th>Status</th>
              <th></th>
            </tr></thead>
            <tbody id="products-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal editar / criar produto ──────────────────────────────────────── -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modal-title">Novo Produto</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <div class="form-group">
        <label>Nome *</label>
        <input type="text" id="edit-name" placeholder="Camiseta Básica">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" id="edit-desc" placeholder="Algodão 100%…">
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label>Preço (R$) *</label>
          <input type="number" id="edit-price" step="0.01" placeholder="59.90">
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="edit-category">
            <option value="">— Sem categoria —</option>
          </select>
        </div>
      </div>

      <!-- ── Image Uploader ──────────────────────────────────────────────── -->
      <div class="form-group">
        <label>
          Imagens *
          <small style="color:var(--muted);font-weight:400"> (mín. 1 · máx. 5 · até 5 MB cada)</small>
        </label>
        <div class="img-uploader" id="img-uploader"
             onclick="triggerFilePicker()"
             ondragover="onDragOver(event)"
             ondragleave="onDragLeave(event)"
             ondrop="onDrop(event)">
          <div class="img-grid" id="img-grid"></div>
          <div class="img-hint">
            <span class="img-count" id="img-count">0 / 5</span>
            &nbsp;·&nbsp; clique ou arraste imagens aqui
          </div>
        </div>
        <input type="file" id="file-input" accept="image/*" multiple
               style="display:none" onchange="onFilesSelected(this.files)">
        <div class="form-error" id="err-images" style="margin-top:.35rem"></div>
      </div>

      <!-- ── Estoque ──────────────────────────────────────────────────────── -->
      <div id="stock-row" class="form-group">
        <label>Estoque
          <small style="color:var(--muted);font-weight:400">(ignorado se houver variações)</small>
        </label>
        <input type="number" id="edit-stock" min="0" placeholder="0" value="0">
      </div>

      <!-- ── Sob Encomenda ──────────────────────────────────────────────── -->
      <div class="form-group" style="margin-bottom:.25rem">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;user-select:none">
          <input type="checkbox" id="edit-mto" onchange="toggleMTO()">
          Vender sob encomenda
          <span style="font-size:.78rem;color:var(--muted);font-weight:400">(não controla estoque)</span>
        </label>
      </div>

      <div id="mto-box" class="preorder-box" style="display:none">
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:#92400e;margin-bottom:.6rem">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
          Produto sob encomenda — compras liberadas sem verificação de estoque.
        </div>
        <div class="form-group" style="margin:0">
          <label style="font-size:.82rem">
            Data limite para pedidos
            <small style="color:var(--muted);font-weight:400"> (opcional — deixe em branco para prazo indefinido)</small>
          </label>
          <input type="date" id="edit-deadline" style="margin-top:.3rem">
        </div>
      </div>

      <!-- ── Ativo ──────────────────────────────────────────────────────── -->
      <div id="active-row" class="form-group" style="display:none;margin-top:.75rem">
        <label><input type="checkbox" id="edit-active" checked> Produto ativo</label>
      </div>

      <!-- ── Variações ──────────────────────────────────────────────────── -->
      <div style="margin-top:.75rem">
        <label style="font-size:.875rem;font-weight:500">Variações (tamanhos / cores)</label>
        <p style="font-size:.8rem;color:var(--muted);margin:.25rem 0 .5rem">
          Se o produto tem variações, o estoque é controlado por variação.
        </p>
        <div id="variations-list" style="margin-top:.5rem"></div>
        <button type="button" class="btn btn-secondary"
                style="margin-top:.4rem;font-size:.8rem" onclick="addVariation()">
          + Adicionar variação
        </button>
      </div>

      <div class="form-error" id="err-modal" style="margin-top:.75rem"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveProduct()">Salvar</button>
    </div>
  </div>
</div>

<!-- ── Modal estoque / vendas por variação ────────────────────────────────── -->
<div class="modal-overlay" id="stock-modal" style="display:none" onclick="if(event.target===this)closeStockModal()">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:440px">
    <div class="modal-header">
      <h2 id="stock-modal-title">Estoque e Vendas</h2>
      <button class="modal-close" onclick="closeStockModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="stock-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeStockModal()">Fechar</button>
    </div>
  </div>
</div>

<script src="/js/site-config.js"></script>
<script src="/admin/js/admin.js"></script>
<script src="/admin/js/sidebar.js"></script>
<script>
document.getElementById('sidebar-root').innerHTML = sidebarHTML();

let products   = [];
let categories = [];

// ── Estado do uploader ──────────────────────────────────────────────────────
let existingImages = [];
let newFiles       = [];
const MAX_IMAGES   = 5;

function totalImages() { return existingImages.length + newFiles.length; }

// ── Uploader ─────────────────────────────────────────────────────────────────
function triggerFilePicker() {
  if (totalImages() >= MAX_IMAGES) return;
  document.getElementById('file-input').value = '';
  document.getElementById('file-input').click();
}
function onDragOver(e)  { e.preventDefault(); document.getElementById('img-uploader').classList.add('drag-over'); }
function onDragLeave(e) { e.preventDefault(); document.getElementById('img-uploader').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('img-uploader').classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files));
}
function onFilesSelected(fileList) { addFiles(Array.from(fileList)); }

function addFiles(files) {
  const imgErr  = document.getElementById('err-images');
  imgErr.textContent = '';
  const remaining = MAX_IMAGES - totalImages();
  if (remaining <= 0) { imgErr.textContent = `Máximo de ${MAX_IMAGES} imagens atingido.`; return; }
  const allowed = files.filter(f => f.type.startsWith('image/'));
  if (allowed.length < files.length) imgErr.textContent = 'Apenas arquivos de imagem são aceitos.';
  allowed.slice(0, remaining).forEach(file =>
    newFiles.push({ file, previewUrl: URL.createObjectURL(file) })
  );
  if (allowed.length > remaining)
    imgErr.textContent = `Apenas as primeiras ${remaining} imagens foram adicionadas (limite de ${MAX_IMAGES}).`;
  renderThumbs();
}

function removeExisting(idx) { existingImages.splice(idx, 1); renderThumbs(); }
function removeNew(idx) { URL.revokeObjectURL(newFiles[idx].previewUrl); newFiles.splice(idx, 1); renderThumbs(); }

function renderThumbs() {
  const grid  = document.getElementById('img-grid');
  const count = document.getElementById('img-count');
  const total = totalImages();
  count.textContent = `${total} / ${MAX_IMAGES}`;
  count.className   = 'img-count' + (total >= MAX_IMAGES ? ' at-limit' : '');

  let html = '';
  existingImages.forEach((img, i) => {
    html += `<div class="img-thumb">
      <img src="${img.url}" alt="imagem ${i + 1}">
      <button class="img-thumb-remove" type="button"
              onclick="event.stopPropagation();removeExisting(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:10px;height:10px">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      ${i === 0 ? '<span class="img-thumb-badge">Capa</span>' : ''}
    </div>`;
  });
  newFiles.forEach((nf, i) => {
    const gi = existingImages.length + i;
    html += `<div class="img-thumb">
      <img src="${nf.previewUrl}" alt="nova ${i + 1}">
      <button class="img-thumb-remove" type="button"
              onclick="event.stopPropagation();removeNew(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width:10px;height:10px">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      ${gi === 0 ? '<span class="img-thumb-badge">Capa</span>' : ''}
    </div>`;
  });
  if (total < MAX_IMAGES) {
    html += `<div class="img-add-tile" onclick="event.stopPropagation();triggerFilePicker()">
      <span class="img-add-tile-icon">+</span><span>Adicionar</span>
    </div>`;
  }
  grid.innerHTML = html;
}

// ── Toggle encomenda ──────────────────────────────────────────────────────────
function toggleMTO() {
  const on = document.getElementById('edit-mto').checked;
  document.getElementById('mto-box').style.display = on ? 'block' : 'none';
  if (!on) document.getElementById('edit-deadline').value = '';
}

// ── Tabela ────────────────────────────────────────────────────────────────────
async function loadCategories() {
  const res  = await fetch('/api/categories');
  categories = await res.json();
  const sel  = document.getElementById('edit-category');
  sel.innerHTML = '<option value="">— Sem categoria —</option>' +
    categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function loadProducts() {
  await requireAdmin();
  await loadCategories();
  const res = await fetch('/api/admin/products');
  products  = await res.json();

  const tbody = document.getElementById('products-body');

  // SVGs
  const iconEdit = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  const iconDel  = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
  const iconWarn = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
  const iconList = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;
  const iconPkg  = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;
  const imgPlaceholder = `<div class="product-thumb-placeholder"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

  tbody.innerHTML = products.map(p => {
    const hasVariations = p.variations && p.variations.length > 0;
    const isMTO         = !!p.made_to_order;

    // Coluna Estoque
    let estoqueHTML;
    if (isMTO) {
      const totalSold = p.total_ordered || 0;
      estoqueHTML = `
        <button class="stock-btn" onclick="openStockDetail(${p.id})" title="Ver detalhes por variação">
          ${iconPkg}
          <span style="color:#f59e0b;font-size:.8rem;font-weight:600">${totalSold} vendido${totalSold !== 1 ? 's' : ''}</span>
        </button>`;
    } else if (hasVariations) {
      const totalStock = p.variations.reduce((s, v) => s + v.stock, 0);
      const semEstoque = totalStock <= 0;
      estoqueHTML = `
        <button class="stock-btn ${semEstoque ? 'warn' : ''}" onclick="openStockDetail(${p.id})" title="Ver detalhes por variação">
          ${semEstoque ? iconWarn : iconList}
          <span>${totalStock} em estoque</span>
        </button>`;
    } else {
      const stock      = p.stock ?? 0;
      const semEstoque = stock <= 0;
      estoqueHTML = `
        <button class="stock-btn ${semEstoque ? 'warn' : ''}" onclick="openStockDetail(${p.id})" title="Ver detalhes">
          ${semEstoque ? iconWarn : iconList}
          <span>${stock}</span>
        </button>`;
    }

    // Categoria
    const catName = p.category_id
      ? (categories.find(c => c.id === p.category_id)?.name || '—')
      : '—';

    // Prazo (encomenda)
    const deadlineLabel = isMTO && p.preorder_deadline
      ? `<div style="font-size:.7rem;color:${p.preorder_expired ? '#94a3b8' : '#f59e0b'};margin-top:.15rem">
           ${p.preorder_expired ? 'Encerrado' : 'Até'} ${new Date(p.preorder_deadline + 'T00:00:00').toLocaleDateString('pt-BR')}
         </div>`
      : '';

    return `
      <tr>
        <td>
          ${p.image_url
            ? `<img class="product-thumb" src="${p.image_url}" alt="${p.name}">`
            : imgPlaceholder}
        </td>
        <td>
          <div style="display:flex;align-items:center;gap:.4rem;font-weight:600">
            ${p.name}
            ${isMTO ? `<span class="badge-mto">Encomenda</span>` : ''}
          </div>
          ${deadlineLabel}
        </td>
        <td style="color:#64748b;font-size:.85rem">${catName}</td>
        <td style="font-weight:600">${fmt(p.price)}</td>
        <td>${estoqueHTML}</td>
        <td style="font-size:.82rem;color:#64748b">
          ${hasVariations ? p.variations.map(v => v.label).join(', ') : '—'}
        </td>
        <td><span class="badge ${p.active ? 'badge-approved' : 'badge-rejected'}">${p.active ? 'Ativo' : 'Inativo'}</span></td>
        <td>
          <div class="action-cell">
            <button class="btn btn-secondary" onclick="editProduct(${p.id})">
              ${iconEdit} Editar
            </button>
            <button class="btn btn-secondary" style="color:var(--danger);border-color:var(--danger)"
              onclick="deleteProduct(${p.id})">
              ${iconDel} Excluir
            </button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

// ── Modal Estoque / Vendas por Variação ───────────────────────────────────────
function openStockDetail(productId) {
  const p = products.find(x => x.id === productId);
  if (!p) return;

  document.getElementById('stock-modal-title').textContent = `Estoque e Vendas — ${p.name}`;

  const isMTO         = !!p.made_to_order;
  const hasVariations = p.variations && p.variations.length > 0;

  let bodyHTML = '';

  if (hasVariations) {
    const totalStock = p.variations.reduce((s, v) => s + v.stock, 0);
    const totalSold  = p.variations.reduce((s, v) => s + (v.sold || 0), 0);

    bodyHTML = `
      <table class="var-sales-table">
        <thead>
          <tr>
            <th>Variação</th>
            <th style="text-align:center">${isMTO ? 'Disponível' : 'Estoque'}</th>
            <th style="text-align:center">Vendidos</th>
          </tr>
        </thead>
        <tbody>
          ${p.variations.map(v => `
            <tr>
              <td>${v.label}</td>
              <td style="text-align:center">${isMTO ? '—' : v.stock}</td>
              <td style="text-align:center">
                <span class="sold-chip">${v.sold || 0}</span>
              </td>
            </tr>
          `).join('')}
          <tr>
            <td>Total</td>
            <td style="text-align:center">${isMTO ? '—' : totalStock}</td>
            <td style="text-align:center"><span class="sold-chip">${totalSold}</span></td>
          </tr>
        </tbody>
      </table>`;
  } else {
    // Produto sem variações
    const sold = p.total_ordered || 0;
    const stock = isMTO ? '—' : (p.stock ?? 0);
    bodyHTML = `
      <table class="var-sales-table">
        <thead>
          <tr>
            <th>Item</th>
            <th style="text-align:center">${isMTO ? 'Tipo' : 'Estoque'}</th>
            <th style="text-align:center">Vendidos</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>${p.name}</td>
            <td style="text-align:center">${isMTO ? 'Sob encomenda' : stock}</td>
            <td style="text-align:center"><span class="sold-chip">${sold}</span></td>
          </tr>
        </tbody>
      </table>`;
  }

  document.getElementById('stock-modal-body').innerHTML = bodyHTML;
  document.getElementById('stock-modal').style.display = 'flex';
}

function closeStockModal() {
  document.getElementById('stock-modal').style.display = 'none';
}

// ── Variações ─────────────────────────────────────────────────────────────────
function addVariation(id = '', label = '', stock = 0) {
  const div = document.createElement('div');
  div.className  = 'variation-row';
  div.style.cssText = 'display:flex;gap:.5rem;margin-bottom:.4rem;align-items:center';
  div.innerHTML = `
    <input type="hidden" value="${id}">
    <input type="text"   placeholder="Ex: P, M, G, GG" value="${label}" style="flex:2">
    <input type="number" placeholder="Estoque" value="${stock}" min="0" style="flex:1">
    <button type="button" onclick="this.parentElement.remove()"
      style="background:none;border:none;color:var(--danger);cursor:pointer;padding:0 .25rem;display:flex;align-items:center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>`;
  document.getElementById('variations-list').appendChild(div);
}

// ── Modal open/close ──────────────────────────────────────────────────────────
function resetUploader(images = []) {
  newFiles.forEach(nf => URL.revokeObjectURL(nf.previewUrl));
  newFiles       = [];
  existingImages = images.map(url => ({ url }));
  document.getElementById('err-images').textContent = '';
  document.getElementById('file-input').value       = '';
  renderThumbs();
}

function openModal(product = null) {
  document.getElementById('edit-id').value            = product?.id    || '';
  document.getElementById('edit-name').value          = product?.name  || '';
  document.getElementById('edit-desc').value          = product?.description || '';
  document.getElementById('edit-price').value         = product?.price || '';
  document.getElementById('edit-stock').value         = product?.stock ?? 0;
  document.getElementById('edit-category').value      = product?.category_id || '';
  document.getElementById('edit-active').checked      = product ? !!product.active : true;
  document.getElementById('active-row').style.display = product ? 'block' : 'none';
  document.getElementById('modal-title').textContent  = product ? 'Editar Produto' : 'Novo Produto';
  document.getElementById('err-modal').textContent    = '';
  document.getElementById('variations-list').innerHTML = '';

  const isMTO = !!product?.made_to_order;
  document.getElementById('edit-mto').checked         = isMTO;
  document.getElementById('mto-box').style.display    = isMTO ? 'block' : 'none';
  document.getElementById('edit-deadline').value      = product?.preorder_deadline || '';

  resetUploader(product?.images || (product?.image_url ? [product.image_url] : []));

  if (product?.variations?.length) {
    product.variations.forEach(v => addVariation(v.id, v.label, v.stock));
  }

  document.getElementById('modal').style.display = 'flex';
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (p) openModal(p);
}

function closeModal() {
  newFiles.forEach(nf => URL.revokeObjectURL(nf.previewUrl));
  newFiles = []; existingImages = [];
  document.getElementById('modal').style.display = 'none';
}

async function deleteProduct(id) {
  if (!confirm('Excluir este produto?')) return;
  await fetch(`/api/products/${id}`, { method: 'DELETE' });
  loadProducts();
}

// ── Salvar ────────────────────────────────────────────────────────────────────
async function saveProduct() {
  const id          = document.getElementById('edit-id').value;
  const name        = document.getElementById('edit-name').value.trim();
  const description = document.getElementById('edit-desc').value.trim();
  const price       = parseFloat(document.getElementById('edit-price').value);
  const stock       = parseInt(document.getElementById('edit-stock').value, 10) || 0;
  const active      = document.getElementById('edit-active').checked;
  const category_id = document.getElementById('edit-category').value || null;
  const mto         = document.getElementById('edit-mto').checked;
  const deadline    = document.getElementById('edit-deadline').value || '';

  document.getElementById('err-modal').textContent  = '';
  document.getElementById('err-images').textContent = '';

  if (!name || !price) {
    document.getElementById('err-modal').textContent = 'Nome e preço são obrigatórios.';
    return;
  }
  if (totalImages() === 0) {
    document.getElementById('err-images').textContent = 'Adicione pelo menos 1 imagem.';
    return;
  }

  const rows       = document.querySelectorAll('#variations-list .variation-row');
  const variations = Array.from(rows).map(r => {
    const inputs = r.querySelectorAll('input');
    return { id: inputs[0].value || null, label: inputs[1].value.trim(), stock: parseInt(inputs[2].value, 10) || 0 };
  }).filter(v => v.label);

  const fd = new FormData();
  fd.append('name',            name);
  fd.append('description',     description);
  fd.append('price',           price);
  fd.append('stock',           stock);
  fd.append('active',          active);
  fd.append('category_id',     category_id || '');
  fd.append('made_to_order',   mto ? '1' : '0');
  fd.append('preorder_deadline', mto ? deadline : '');
  fd.append('variations',      JSON.stringify(variations));
  fd.append('keepImages',      JSON.stringify(existingImages.map(i => i.url)));
  newFiles.forEach(nf => fd.append('images', nf.file));

  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';

  try {
    const url    = id ? `/api/products/${id}` : '/api/products';
    const method = id ? 'PUT' : 'POST';
    const res    = await fetch(url, { method, body: fd });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Erro ao salvar');
    }
    closeModal();
    loadProducts();
  } catch (err) {
    document.getElementById('err-modal').textContent = err.message || 'Erro ao salvar.';
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = 'Salvar';
  }
}

loadProducts();
</script>
