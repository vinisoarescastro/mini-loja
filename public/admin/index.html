<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .stats-grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card { background: #fff; border-radius: 10px; padding: 1.25rem; border: 1px solid #e2e8f0; }
    .stat-card.accent { border-left: 4px solid #6366f1; }
    .stat-card.blue   { border-left: 4px solid #3b82f6; }
    .stat-card.green  { border-left: 4px solid #22c55e; }
    .stat-card.orange { border-left: 4px solid #f59e0b; }
    .stat-label { font-size: .78rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 1.65rem; font-weight: 800; margin-top: .3rem; }
    .stat-sub   { font-size: .78rem; color: #94a3b8; margin-top: .15rem; }
    .stat-icon  {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: .75rem;
    }
    .stat-icon svg { width: 20px; height: 20px; }
    .stat-card.accent .stat-icon { background: #ede9fe; color: #6366f1; }
    .stat-card.blue   .stat-icon { background: #dbeafe; color: #3b82f6; }
    .stat-card.green  .stat-icon { background: #dcfce7; color: #16a34a; }
    .stat-card.orange .stat-icon { background: #fef3c7; color: #d97706; }

    .rank-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      font-size: .75rem; font-weight: 700;
      background: #f1f5f9; color: #64748b;
    }
    .rank-num.top { background: #fef9c3; color: #854d0e; }

    .table-section-title {
      display: flex; align-items: center; gap: .5rem; font-weight: 600;
    }
    .table-section-title svg { width: 16px; height: 16px; color: #64748b; }
  </style>
</head>
<body>
<div class="admin-wrapper">
  <div id="sidebar-root"></div>
  <div class="admin-main">
    <div class="admin-topbar"><h1>Dashboard</h1></div>
    <div class="admin-content">

      <!-- Stats row -->
      <div class="stats-grid-2">

        <!-- Total de Pedidos -->
        <div class="stat-card accent">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
          </div>
          <div class="stat-label">Total de Pedidos</div>
          <div class="stat-value" id="s-total-orders">—</div>
          <div class="stat-sub">Excluindo cancelados</div>
        </div>

        <!-- Total Aprovados (contagem) -->
        <div class="stat-card blue">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="stat-label">Pedidos Aprovados</div>
          <div class="stat-value" id="s-approved-orders">—</div>
          <div class="stat-sub">Pagamentos confirmados</div>
        </div>

        <!-- Vendas Aprovadas (valor) -->
        <div class="stat-card green">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
          <div class="stat-label">Vendas Aprovadas</div>
          <div class="stat-value" id="s-approved">—</div>
          <div class="stat-sub">Valor confirmado</div>
        </div>

        <!-- Vendas Pendentes (valor) -->
        <div class="stat-card orange">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="stat-label">Vendas Pendentes</div>
          <div class="stat-value" id="s-pending">—</div>
          <div class="stat-sub">Aguardando confirmação</div>
        </div>

      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start">

        <!-- Pedidos recentes -->
        <div class="table-wrap">
          <div class="table-header">
            <span class="table-section-title">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
              </svg>
              Pedidos Recentes
            </span>
          </div>
          <table>
            <thead><tr>
              <th>Código</th><th>Cliente</th><th>Total</th><th>Pagamento</th>
            </tr></thead>
            <tbody id="recent-orders-body"></tbody>
          </table>
        </div>

        <!-- Ranking de produtos -->
        <div class="table-wrap">
          <div class="table-header">
            <span class="table-section-title">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
              </svg>
              Produtos Mais Vendidos
            </span>
          </div>
          <table>
            <thead><tr>
              <th>#</th><th>Produto</th><th style="text-align:right">Qtd</th><th style="text-align:right">Receita</th>
            </tr></thead>
            <tbody id="top-products-body"></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="/admin/js/admin.js"></script>
<script src="/admin/js/sidebar.js"></script>
<script>
  document.getElementById('sidebar-root').innerHTML = sidebarHTML();

  async function load() {
    await requireAdmin();
    const res = await fetch('/api/admin/dashboard');
    if (!res.ok) return;
    const d = await res.json();

    document.getElementById('s-total-orders').textContent    = d.totalOrders;
    document.getElementById('s-approved-orders').textContent = d.totalApprovedOrders;
    document.getElementById('s-approved').textContent        = fmt(d.totalApproved);
    document.getElementById('s-pending').textContent         = fmt(d.totalPending);

    // Pedidos recentes
    document.getElementById('recent-orders-body').innerHTML =
      d.recentOrders.map(o => `
        <tr>
          <td><strong>${o.code}</strong></td>
          <td>${o.customer_name}</td>
          <td>${fmt(o.total)}</td>
          <td><span class="${badgeClass(o.payment_status)}">${PAY_LABEL[o.payment_status] || o.payment_status}</span></td>
        </tr>
      `).join('') || `<tr><td colspan="4" class="table-empty">Nenhum pedido</td></tr>`;

    // Top produtos
    document.getElementById('top-products-body').innerHTML =
      (d.topProducts || []).map((p, i) => `
        <tr>
          <td><span class="rank-num ${i < 3 ? 'top' : ''}">${i + 1}</span></td>
          <td><strong style="font-size:.875rem">${p.name}</strong></td>
          <td style="text-align:right;font-weight:700">${p.qty}</td>
          <td style="text-align:right;color:#16a34a;font-weight:600">${fmt(p.revenue)}</td>
        </tr>
      `).join('') || `<tr><td colspan="4" class="table-empty">Nenhuma venda registrada</td></tr>`;
  }

  load();
</script>
</body>
</html>
