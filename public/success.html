<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido Confirmado — MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="site-logo">🛍️ MiniLoja</a>
  </div>
</header>

<main class="container">
  <div class="card success-box">
    <div class="success-icon">🎉</div>
    <h1 style="font-size:1.5rem; font-weight:700">Pedido Realizado!</h1>
    <p style="color:var(--muted); margin-top:.5rem">Seu pedido foi recebido com sucesso.</p>

    <p style="margin-top:1.25rem; font-size:.9rem">Código do pedido:</p>
    <div class="order-code-display" id="order-code">—</div>

    <button class="btn btn-secondary" onclick="copyCode()" style="margin-top:.5rem">
      📋 Copiar código
    </button>

    <p style="margin-top:1.5rem; font-size:.875rem; color:var(--muted); line-height:1.6">
      Guarde este código para acompanhar seu pedido.<br>
      Você pode rastrear o status em <strong>Meus Pedidos</strong>.
    </p>

    <div style="display:flex;gap:.75rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
      <a href="/track.html" class="btn btn-primary">🔍 Acompanhar Pedido</a>
      <a href="/" class="btn btn-secondary">🛍️ Continuar Comprando</a>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const code = new URLSearchParams(window.location.search).get('code') || '—';
  document.getElementById('order-code').textContent = code;

  function copyCode() {
    navigator.clipboard.writeText(code).then(() => {
      const t = document.getElementById('toast');
      t.textContent = 'Código copiado!';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  }
</script>
</body>
</html>
