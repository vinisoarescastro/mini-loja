<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="header-root"></div>

<main class="container page-content">
  <h1 class="section-title">Finalizar Pedido</h1>

  <div id="empty-cart" style="display:none; text-align:center; padding: 4rem 0">
    <p style="color:var(--muted); font-size:1.1rem">Seu carrinho está vazio.</p>
    <a href="/" class="btn btn-primary" style="margin-top:1rem">Ver Produtos</a>
  </div>

  <div class="checkout-grid" id="checkout-content">
    <!-- Dados pessoais -->
    <div class="card" style="padding:1.5rem">
      <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:1.25rem">Seus Dados</h2>

      <div class="form-group">
        <label for="name">Nome completo *</label>
        <input type="text" id="name" placeholder="João Silva">
        <div class="form-error" id="err-name"></div>
      </div>

      <div class="form-group">
        <label for="phone">WhatsApp / Telefone *</label>
        <input type="tel" id="phone" placeholder="(11) 99999-9999">
        <div class="form-error" id="err-phone"></div>
      </div>

      <div class="form-group">
        <label for="email">E-mail (opcional)</label>
        <input type="email" id="email" placeholder="joao@exemplo.com">
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="submit-btn" onclick="submitOrder()">
        Ir para Pagamento
      </button>
      <div class="form-error" id="err-general" style="margin-top:.5rem; text-align:center"></div>
    </div>

    <!-- Resumo -->
    <div>
      <div class="card" style="padding:1.25rem">
        <h2 style="font-size:1rem;font-weight:700;margin-bottom:1rem">Resumo do Pedido</h2>
        <div id="summary-items"></div>
        <div class="order-summary-total">
          <span>Total</span>
          <span id="summary-total"></span>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="/js/site-config.js"></script>
<script src="/js/header.js"></script>
<script src="/js/cart.js"></script>
<script>
  renderHeader({ backLink: { href: '/', label: '← Voltar' } });

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  function renderSummary() {
    const items = loadCart();
    if (!items.length) {
      document.getElementById('checkout-content').style.display = 'none';
      document.getElementById('empty-cart').style.display = 'block';
      return;
    }
    document.getElementById('summary-items').innerHTML = items.map(i => `
      <div class="order-summary-item">
        <span>${i.productName}${i.variationLabel ? ` (${i.variationLabel})` : ''} × ${i.quantity}</span>
        <span>${fmt(i.price * i.quantity)}</span>
      </div>
    `).join('');
    document.getElementById('summary-total').textContent = fmt(cartTotal());
  }

  async function submitOrder() {
    const name  = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.replace(/\D/g, '');
    const email = document.getElementById('email').value.trim();
    let valid = true;

    document.querySelectorAll('.form-error').forEach(el => el.textContent = '');

    if (!name)             { document.getElementById('err-name').textContent  = 'Informe seu nome.';   valid = false; }
    if (phone.length < 10) { document.getElementById('err-phone').textContent = 'Telefone inválido.';  valid = false; }
    if (!valid) return;

    const items = loadCart();
    if (!items.length) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Aguarde…';

    try {
      const res = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name, phone, email: email || undefined,
          items: items.map(i => ({
            productId:   i.productId,
            variationId: i.variationId,
            quantity:    i.quantity,
          })),
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro no servidor');
      if (data.paymentUrl) {
        clearCart();
        window.location.href = data.paymentUrl;
      } else {
        throw new Error('Não foi possível iniciar o pagamento. Tente novamente em instantes.');
      }
    } catch (err) {
      document.getElementById('err-general').textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'Ir para Pagamento';
    }
  }

  renderSummary();
</script>
</body>
</html>
