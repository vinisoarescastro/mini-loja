<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Pedidos — MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="header-root"></div>

<main class="container page-content">
  <div class="track-box">
    <h1 class="section-title">Meus Pedidos</h1>

    <div class="toggle-tabs">
      <button class="toggle-tab active" id="tab-code" onclick="setTab('code')">Por Código</button>
      <button class="toggle-tab" id="tab-phone" onclick="setTab('phone')">Por Telefone</button>
    </div>

    <div class="form-group">
      <label id="search-label">Código do pedido</label>
      <input type="text" id="search-input" placeholder="PED-2024-XXXXX" style="text-transform:uppercase">
    </div>
    <button class="btn btn-primary btn-full" onclick="search()">Buscar</button>
    <div class="form-error" id="err-search" style="margin-top:.5rem;text-align:center"></div>

    <div id="results" style="margin-top:2rem"></div>
  </div>
</main>

<script src="/js/site-config.js"></script>
<script src="/js/header.js"></script>
<script>
  renderHeader({ backLink: { href: '/', label: '← Voltar' } });

  let currentTab = 'code';

  const urlCode = new URLSearchParams(window.location.search).get('code');
  if (urlCode) {
    document.getElementById('search-input').value = urlCode;
    setTimeout(search, 300);
  }

  function setTab(tab) {
    currentTab = tab;
    document.getElementById('tab-code').classList.toggle('active', tab === 'code');
    document.getElementById('tab-phone').classList.toggle('active', tab === 'phone');
    const input = document.getElementById('search-input');
    if (tab === 'code') {
      document.getElementById('search-label').textContent = 'Código do pedido';
      input.placeholder = 'PED-2024-XXXXX';
      input.style.textTransform = 'uppercase';
      input.type = 'text';
    } else {
      document.getElementById('search-label').textContent = 'WhatsApp / Telefone';
      input.placeholder = '(11) 99999-9999';
      input.style.textTransform = 'none';
      input.type = 'tel';
    }
    input.value = '';
    document.getElementById('results').innerHTML = '';
    document.getElementById('err-search').textContent = '';
  }

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  function fmtDate(dt) {
    return new Date(dt).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  const STATUS_LABEL = {
    PENDING:'Pendente', CONFIRMED:'Confirmado', PREPARING:'Preparando',
    SHIPPED:'Enviado', DELIVERED:'Entregue', CANCELLED:'Cancelado',
  };
  const PAY_LABEL = { PENDING:'Aguardando', APPROVED:'Aprovado', REJECTED:'Recusado', REFUNDED:'Reembolsado', CANCELLED:'Cancelado' };

  async function search() {
    const input = document.getElementById('search-input').value.trim();
    const err   = document.getElementById('err-search');
    err.textContent = '';
    if (!input) { err.textContent = 'Informe um valor para busca.'; return; }

    const url = currentTab === 'code'
      ? `/api/track/order/${encodeURIComponent(input.toUpperCase())}`
      : `/api/track/phone/${encodeURIComponent(input.replace(/\D/g,''))}`;

    const res  = await fetch(url);
    const data = await res.json();
    const results = document.getElementById('results');

    if (!res.ok) { err.textContent = data.error || 'Pedido não encontrado.'; results.innerHTML = ''; return; }

    const orders = Array.isArray(data) ? data : [data];
    results.innerHTML = orders.map(o => `
      <div class="card" style="padding:1.25rem;margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem">
          <strong style="font-size:1rem;letter-spacing:.03em">${o.code}</strong>
          <span class="badge badge-${(o.payment_status||'').toLowerCase()}">${PAY_LABEL[o.payment_status] || o.payment_status}</span>
        </div>
        <div style="margin-top:.5rem;font-size:.875rem;color:var(--muted)">${fmtDate(o.created_at)}</div>
        <div style="margin-top:.75rem">
          ${(o.items||[]).map(i => `
            <div style="display:flex;justify-content:space-between;font-size:.875rem;padding:.3rem 0;border-bottom:1px solid var(--border)">
              <span>${i.product_name}${i.variation_label ? ` (${i.variation_label})` : ''} × ${i.quantity}</span>
              <span>${fmt(i.unit_price * i.quantity)}</span>
            </div>
          `).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;font-weight:700;margin-top:.75rem">
          <span>Total</span><span>${fmt(o.total)}</span>
        </div>
        <div style="margin-top:.5rem;font-size:.8rem;color:var(--muted)">
          Status: ${STATUS_LABEL[o.order_status] || o.order_status}
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
