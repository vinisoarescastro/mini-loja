<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Pedidos — MiniLoja</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="site-logo">🛍️ MiniLoja</a>
    <nav class="header-nav">
      <a href="/">← Voltar</a>
    </nav>
  </div>
</header>

<main class="container page-content">
  <div class="track-box">
    <h1 class="section-title">Meus Pedidos</h1>

    <div class="toggle-tabs">
      <button class="toggle-tab active" id="tab-code" onclick="setTab('code')">Por Código</button>
      <button class="toggle-tab" id="tab-phone" onclick="setTab('phone')">Por Telefone</button>
    </div>

    <div class="form-group">
      <label id="search-label">Código do pedido</label>
      <input type="text" id="search-input" placeholder="PED-2024-XXXXX" style="text-transform:uppercase">
    </div>
    <button class="btn btn-primary btn-full" onclick="search()">Buscar</button>
    <div class="form-error" id="err-search" style="margin-top:.5rem;text-align:center"></div>

    <div id="results" style="margin-top:2rem"></div>
  </div>
</main>

<script>
  let currentTab = 'code';

  // Pre-fill from URL
  const urlCode = new URLSearchParams(window.location.search).get('code');
  if (urlCode) {
    document.getElementById('search-input').value = urlCode;
    setTimeout(search, 300);
  }

  function setTab(tab) {
    currentTab = tab;
    document.getElementById('tab-code').classList.toggle('active', tab === 'code');
    document.getElementById('tab-phone').classList.toggle('active', tab === 'phone');
    const input = document.getElementById('search-input');
    if (tab === 'code') {
      document.getElementById('search-label').textContent = 'Código do pedido';
      input.placeholder = 'PED-2024-XXXXX';
      input.style.textTransform = 'uppercase';
      input.type = 'text';
    } else {
      document.getElementById('search-label').textContent = 'WhatsApp / Telefone';
      input.placeholder = '(11) 99999-9999';
      input.style.textTransform = 'none';
      input.type = 'tel';
    }
    input.value = '';
    document.getElementById('results').innerHTML = '';
  }

  const STATUS_LABEL = {
    PENDING: 'Pendente', CONFIRMED: 'Confirmado', PREPARING: 'Preparando',
    SHIPPED: 'Enviado', DELIVERED: 'Entregue', CANCELLED: 'Cancelado',
  };
  const PAY_LABEL = {
    PENDING: 'Aguardando', APPROVED: 'Aprovado', REJECTED: 'Recusado',
    REFUNDED: 'Reembolsado', CANCELLED: 'Cancelado',
  };

  function badgeClass(status) {
    const map = { APPROVED:'approved',REJECTED:'rejected',CANCELLED:'cancelled',
      CONFIRMED:'confirmed',PREPARING:'preparing',SHIPPED:'shipped',
      DELIVERED:'delivered',REFUNDED:'refunded',PENDING:'pending' };
    return 'badge badge-' + (map[status] || 'pending');
  }

  function fmt(val) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
  }

  function fmtDate(dt) {
    return new Date(dt).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  async function search() {
    const value = document.getElementById('search-input').value
      .replace(/\D/g, currentTab === 'phone' ? '' : undefined)
      ?.trim() || document.getElementById('search-input').value.trim().toUpperCase();

    document.getElementById('err-search').textContent = '';
    document.getElementById('results').innerHTML = '<p style="color:var(--muted)">Buscando…</p>';

    if (!value) {
      document.getElementById('err-search').textContent = 'Preencha o campo de busca.';
      document.getElementById('results').innerHTML = '';
      return;
    }

    try {
      const res = await fetch('/api/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value, type: currentTab }),
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('err-search').textContent = data.error;
        document.getElementById('results').innerHTML = '';
        return;
      }

      const { orders } = data;

      if (!orders.length) {
        document.getElementById('results').innerHTML =
          '<p style="color:var(--muted);text-align:center;padding:2rem 0">Nenhum pedido encontrado.</p>';
        return;
      }

      document.getElementById('results').innerHTML = orders.map(o => `
        <div class="card track-order-card">
          <div class="track-order-header">
            <span class="track-order-code">${o.code}</span>
            <span style="font-size:.8rem;color:var(--muted)">${fmtDate(o.created_at)}</span>
          </div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem">
            <span class="${badgeClass(o.order_status)}">${STATUS_LABEL[o.order_status] || o.order_status}</span>
            <span class="${badgeClass(o.payment_status)}">${PAY_LABEL[o.payment_status] || o.payment_status}</span>
          </div>
          <div class="track-items">
            ${o.items.map(i => `${i.product_name}${i.variation_label ? ` (${i.variation_label})` : ''} × ${i.quantity}`).join(' · ')}
          </div>
          <div style="font-weight:700;margin-top:.5rem">${fmt(o.total)}</div>
        </div>
      `).join('');

    } catch {
      document.getElementById('err-search').textContent = 'Erro ao buscar pedidos.';
      document.getElementById('results').innerHTML = '';
    }
  }

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>
</body>
</html>
